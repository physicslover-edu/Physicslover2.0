<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <title>Class 8 | Physics Lover 2.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* --- Premium Glassmorphism Variables --- */
    :root {
      --bg-color: #050b14;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      
      --primary-cyan: #06b6d4;
      --primary-green: #10b981;
      --primary-gold: #fbbf24;
      --primary-blue: #3b82f6;
      
      --cyan-glow: rgba(6, 182, 212, 0.25);
      --purple-glow: rgba(139, 92, 246, 0.2);
      
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", "Noto Sans Bengali", sans-serif; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-color); color: var(--text-main);
      min-height: 100vh; padding: 15px 15px 90px 15px; overflow-x: hidden; position: relative;
    }

    /* --- Ambient Background Lights --- */
    .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
    .orb-1, .orb-2 { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.6; animation: float 15s infinite alternate ease-in-out; }
    .orb-1 { width: 300px; height: 300px; background: var(--cyan-glow); top: -5%; left: -10%; }
    .orb-2 { width: 300px; height: 300px; background: var(--purple-glow); bottom: 10%; right: -10%; animation-delay: 5s; }
    
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 30px) scale(1.1); }
    }

    /* --- Core Glass Panel --- */
    .glass-panel {
      background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 16px;
    }

    /* --- Header & Lang Switch --- */
    .wrapper { max-width: 900px; margin: 0 auto; position: relative; z-index: 10; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .back-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 8px; cursor: pointer; backdrop-filter: blur(10px);
    }
    .lang-switch { display: flex; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; }
    .lang-btn { background: none; border: none; color: var(--text-muted); padding: 6px 14px; font-size: 0.85rem; font-weight: 600; transition: 0.3s; cursor: pointer; }
    .lang-btn.active { background: var(--primary-cyan); color: #000; }

    /* --- Class Portal Title --- */
    .portal-title {
      font-size: 1.5rem; font-weight: 700; color: var(--primary-cyan); 
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px;
      text-align: center; background: var(--glass-bg); padding: 15px; border-radius: 16px; border: 1px solid var(--glass-border);
    }

    /* --- Subject Tabs --- */
    .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; }
    .tab {
      flex: 1; text-align: center; padding: 12px; border-radius: 14px; font-size: 0.95rem; font-weight: 600;
      background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); color: var(--text-muted); transition: 0.3s; cursor: pointer;
    }
    .tab.active { background: rgba(6, 182, 212, 0.1); color: #fff; border-color: var(--primary-cyan); }

    /* --- General Accordion --- */
    .accordion-body { display: grid; grid-template-rows: 0fr; transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    .accordion-card.expanded .accordion-body { grid-template-rows: 1fr; }
    .accordion-inner { overflow: hidden; }
    .content-pad { padding: 0 15px 15px 15px; }

    /* --- Chapters & Exams Card Styling --- */
    .panel { display: none; animation: fadeIn 0.4s ease; }
    .panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .chapter-card { margin-bottom: 12px; transition: 0.3s; }
    .chapter-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .chapter-title { font-size: 1rem; font-weight: 600; color: #f8fafc; line-height: 1.4; padding-right: 15px; }
    
    .chevron { transition: 0.3s; color: var(--text-muted); font-size: 1rem; }
    .accordion-card.expanded .chevron { transform: rotate(180deg); color: var(--primary-cyan); }

    .exam-header-style { background: rgba(251, 191, 36, 0.08); border-radius: 16px; }
    .exam-header-style .chapter-title { color: var(--primary-gold); }
    .exam-header-style .chevron { color: var(--primary-gold); }

    /* Inner Topic Box */
    .topic-box { background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; margin-top: 10px; }
    .topic-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 12px; color: #cbd5e1; text-align: center; }

    /* --- Action Buttons (3 Buttons Grid for Class 8) --- */
    .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .btn-action {
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px;
      padding: 10px 5px; color: #fff; font-size: 0.75rem; font-weight: 500;
      display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 6px; cursor: pointer; transition: 0.2s; text-align: center;
    }
    .btn-action i { font-size: 1.15rem; }
    .btn-action:active { transform: scale(0.95); }
    .btn-action:hover { background: rgba(255,255,255,0.1); }

    /* --- Toast Notification --- */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 100px);
      background: rgba(15, 23, 42, 0.95); border: 1px solid var(--glass-border); border-radius: 30px;
      padding: 12px 20px; color: #fff; font-size: 0.85rem; font-weight: 500; backdrop-filter: blur(10px);
      display: flex; align-items: center; gap: 10px; z-index: 99999; opacity: 0; transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); width: max-content;
    }
    .toast.show { transform: translate(-50%, 0); opacity: 1; }
  </style>
</head>
<body>
    <div class="ambient-bg">
    <div class="orb-1"></div>
    <div class="orb-2"></div>
  </div>

  <div class="toast" id="appToast">
    <i class="fa-solid fa-bell" style="color: var(--primary-gold)"></i>
    <span id="toastMsg">মেসেজ</span>
  </div>

  <div class="wrapper">
    <div class="header">
      <button class="back-btn" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i> Home</button>
      <div class="lang-switch">
        <button class="lang-btn active" id="btn-bn" onclick="toggleLang('bn')">বাংলা</button>
        <button class="lang-btn" id="btn-en" onclick="toggleLang('en')">EN</button>
      </div>
    </div>

    <div class="portal-title">
      Class 8 Portal
    </div>

    <div class="nav-tabs">
      <div class="tab active" data-tab="paribesh">Science</div>
      <div class="tab" data-tab="onko">Math</div>
    </div>

    <div id="paribesh-panel" class="panel active"></div>
    <div id="onko-panel" class="panel"></div>
  </div>

  <script>
    let lang = 'bn';

    // Dynamic Exam Year
    const currentYear = new Date().getFullYear();
    const examYearDisplay = currentYear < 2026 ? 2026 : currentYear;

    // Database for Class 8
    const dbCourse = {
      exams: {
        paribesh: [
          { id: "p8_ex_1", bn: "১ম সামেটিভ এক্সাম (Science)", en: "1st Summative Exam (Science)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" },
          { id: "p8_ex_2", bn: "২য় সামেটিভ এক্সাম (Science)", en: "2nd Summative Exam (Science)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" },
          { id: "p8_ex_3", bn: "৩য় সামেটিভ এক্সাম (Science)", en: "3rd Summative Exam (Science)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" }
        ],
        onko: [
          { id: "m8_ex_1", bn: "১ম সামেটিভ এক্সাম (Math)", en: "1st Summative Exam (Math)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" },
          { id: "m8_ex_2", bn: "২য় সামেটিভ এক্সাম (Math)", en: "2nd Summative Exam (Math)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" },
          { id: "m8_ex_3", bn: "৩য় সামেটিভ এক্সাম (Math)", en: "3rd Summative Exam (Math)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" }
        ]
      },
      paribesh: [
        { 
          id: "p8_c1", bn: "১) ভৌত পরিবেশ", en: "1) Physical Environment",
          topics: [
            { id: "p8_c1_s1", bn: "১.১) বল ও চাপ", en: "1.1) Force and Pressure", link: "URL" },
            { id: "p8_c1_s2", bn: "১.২) স্পর্শ ছাড়া ক্রিয়াশীল বল", en: "1.2) Non-contact Forces", link: "URL" },
            { id: "p8_c1_s3", bn: "১.৩) তাপ", en: "1.3) Heat", link: "URL" },
            { id: "p8_c1_s4", bn: "১.৪) আলো", en: "1.4) Light", link: "URL" }
          ]
        },
        { 
          id: "p8_c2", bn: "২) মৌল, যৌগ ও রাসায়নিক বিক্রিয়া", en: "2) Elements, Compounds & Reactions",
          topics: [
            { id: "p8_c2_s1", bn: "২.১) পদার্থের প্রকৃতি", en: "2.1) Nature of Matter", link: "URL" },
            { id: "p8_c2_s2", bn: "২.২) পদার্থের গঠন", en: "2.2) Structure of Matter", link: "URL" },
            { id: "p8_c2_s3", bn: "২.৩) রাসায়নিক বিক্রিয়া", en: "2.3) Chemical Reactions", link: "URL" },
            { id: "p8_c2_s4", bn: "২.৪) তড়িতের রাসায়নিক প্রভাব", en: "2.4) Chemical Effects of Current", link: "URL" }
          ]
        },
        { id: "p8_c3", bn: "৩) কয়েকটি গ্যাসের পরিচিতি", en: "3) Introduction to Some Gases", link: "URL" },
        { id: "p8_c4", bn: "৪) প্রকৃতিতে ও জীবজগতে বিভিন্ন রূপে কার্বন", en: "4) Carbon in Nature and Biosphere", link: "URL" },
        { id: "p8_c5", bn: "৫) প্রাকৃতিক ঘটনা ও তার বিশ্লেষণ", en: "5) Natural Phenomena and Analysis", link: "URL" },
        { id: "p8_c6", bn: "৬) জীবদেহের গঠন", en: "6) Structure of Living Organisms", link: "URL" },
        { id: "p8_c7", bn: "৭) অনুজীবের জগৎ", en: "7) World of Microbes", link: "URL" },
        { id: "p8_c8", bn: "৮) মানুষের খাদ্য ও খাদ্য উৎপাদন", en: "8) Human Food and Food Production", link: "URL" },
        { id: "p8_c9", bn: "৯) অন্তঃক্ষরা গ্রন্থি ও বয়ঃসন্ধি", en: "9) Endocrine Glands and Adolescence", link: "URL" },
        { id: "p8_c10", bn: "১০) জীববৈচিত্র্য, পরিবেশের সংকট ও সংরক্ষণ", en: "10) Biodiversity, Crisis & Conservation", link: "URL" },
        { id: "p8_c11", bn: "১১) আমাদের চারপাশের পরিবেশ ও উদ্ভিদজগৎ", en: "11) Our Environment and Plant World", link: "URL" }
      ],
      onko: [
        { id: "m8_c1", bn: "১) পূর্বপাঠের পুনরালোচনা", en: "1) Revision", link: "URL" },
        { id: "m8_c2", bn: "২) পাই চিত্র", en: "2) Pie Chart", link: "URL" },
        { id: "m8_c3", bn: "৩) মূলদ সংখ্যার ধারণা", en: "3) Concept of Rational Numbers", link: "URL" },
        { id: "m8_c4", bn: "৪) বীজগাণিতিক সংখ্যামালার গুণ ও ভাগ", en: "4) Multiplication & Division of Algebraic Expressions", link: "URL" },
        { id: "m8_c5", bn: "৫) ঘনফল নির্ণয়", en: "5) Determining Cube", link: "URL" },
        { id: "m8_c6", bn: "৬) পূরক, সম্পূরক ও সন্নিহিত কোণ", en: "6) Complementary, Supplementary & Adjacent Angles", link: "URL" },
        { id: "m8_c7", bn: "৭) বিপ্রতীপ কোণের ধারণা", en: "7) Concept of Vertically Opposite Angles", link: "URL" },
        { id: "m8_c8", bn: "৮) সমান্তরাল সরলরেখা ও ছেদকের ধর্ম", en: "8) Parallel Lines and Transversal Properties", link: "URL" },
        { id: "m8_c9", bn: "৯) ত্রিভুজের দুটি বাহু ও বিপরীত কোণের সম্পর্ক", en: "9) Relation between Sides and Opposite Angles", link: "https://drive.google.com/file/d/1s-QS8Up5M9UINfZP2aX2QOQ4krszVe8j/view?usp=drivesdk" },
        { id: "m8_c10", bn: "১০) ত্রৈরাশিক", en: "10) Rule of Three", link: "URL" },
        { id: "m8_c11", bn: "১১) শতকরা", en: "11) Percentage", link: "URL" },
        { id: "m8_c12", bn: "১২) মিশ্রণ", en: "12) Mixture", link: "https://drive.google.com/file/d/1sdq2pxqw4YEIOqOpoifF2A8TIAiNuDrB/view?usp=drivesdk" },
        { id: "m8_c13", bn: "১৩) বীজগাণিতিক সংখ্যামালার উৎপাদকে বিশ্লেষণ", en: "13) Factorization of Algebraic Expressions", link: "URL" },
        { id: "m8_c14", bn: "১৪) বীজগাণিতিক সংখ্যামালার গ.সা.গু ও ল.সা.গু", en: "14) HCF and LCM of Algebraic Expressions", link: "URL" },
        { id: "m8_c15", bn: "১৫) বীজগাণিতিক সংখ্যামালার সরলীকরণ", en: "15) Simplification of Algebraic Expressions", link: "URL" },
        { id: "m8_c16", bn: "১৬) ত্রিভূজের কোণ ও বাহুর মধ্যে সম্পর্কের যাচাই", en: "16) Verifying Relation between Angles and Sides", link: "URL" },
        { id: "m8_c17", bn: "১৭) সময় ও কার্য", en: "17) Time and Work", link: "URL" },
        { id: "m8_c18", bn: "১৮) লেখচিত্র", en: "18) Graph", link: "URL" },
        { id: "m8_c19", bn: "১৯) সমীকরণ গঠন ও সমাধান", en: "19) Formation and Solution of Equations", link: "URL" },
        { id: "m8_c20", bn: "২০) জ্যামিতিক প্রমাণ", en: "20) Geometrical Proof", link: "URL" },
        { id: "m8_c21", bn: "২১) ত্রিভূজ অঙ্কন", en: "21) Construction of Triangles", link: "URL" },
        { id: "m8_c22", bn: "২২) সমান্তরাল সরলরেখা অঙ্কন", en: "22) Construction of Parallel Lines", link: "URL" },
        { id: "m8_c23", bn: "২৩) প্রদত্ত সরলরেখাংশকে সমান ভাগে বিভক্ত করা", en: "23) Dividing a Line Segment Equally", link: "URL" }
      ]
    };

    const t = (obj) => lang === 'bn' ? obj.bn : obj.en;

    window.showToast = (msg) => {
      const toast = document.getElementById('appToast');
      document.getElementById('toastMsg').innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Render UI Elements
    function renderUI() {
      ['paribesh', 'onko'].forEach(subject => {
        let html = "";
        
        // 1. Render Exams
        let examContent = "";
        dbCourse.exams[subject].forEach(ex => {
          examContent += `
            <div class="topic-box" style="margin-top: 0; margin-bottom: 15px;">
              <div class="topic-name">${t(ex)}</div>
              <div class="btn-group">
                <button class="btn-action" onclick="triggerMaterial('${ex.linkSug}', '${t(ex)}')">
                  <i class="fa-solid fa-book-open" style="color:var(--primary-gold)"></i> Sug ${examYearDisplay}
                </button>
                <button class="btn-action" onclick="triggerMaterial('${ex.linkPyq}', '${t(ex)}')">
                  <i class="fa-solid fa-file-lines" style="color:var(--primary-cyan)"></i> PYQ
                </button>
                <button class="btn-action" onclick="window.location.href='telegram.html'">
                  <i class="fa-brands fa-telegram" style="color:var(--primary-blue)"></i> Doubt
                </button>
              </div>
            </div>
          `;
        });
          html += `
          <div class="glass-panel chapter-card accordion-card" id="exam_${subject}" style="border-color: rgba(251, 191, 36, 0.4); margin-bottom: 25px;">
            <div class="chapter-header exam-header-style" onclick="toggleAccordion('exam_${subject}')">
              <div class="chapter-title"><i class="fa-solid fa-file-signature"></i> Summative Exams & PYQ</div>
              <i class="fa-solid fa-chevron-down chevron"></i>
            </div>
            <div class="accordion-body">
              <div class="accordion-inner">
                <div class="content-pad" style="padding-top: 15px;">${examContent}</div>
              </div>
            </div>
          </div>
        `;

        // 2. Render Chapters
        dbCourse[subject].forEach((chap) => {
          let innerContent = "";
          if (chap.topics) {
            chap.topics.forEach(sub => {
              innerContent += `
                <div class="topic-box">
                  <div class="topic-name">${t(sub)}</div>
                  <div class="btn-group">
                    <button class="btn-action" onclick="triggerMaterial('${sub.link}', '${t(sub)}')">
                      <i class="fa-solid fa-file-pdf" style="color:var(--primary-cyan)"></i> Note
                    </button>
                    <button class="btn-action" onclick="triggerMaterial('video', '${t(sub)}')">
                      <i class="fa-brands fa-youtube" style="color:#ef4444"></i> Video
                    </button>
                    <button class="btn-action" onclick="window.location.href='telegram.html'">
                      <i class="fa-brands fa-telegram" style="color:var(--primary-blue)"></i> Doubt
                    </button>
                  </div>
                </div>
              `;
            });
          } else {
            innerContent += `
              <div class="topic-box" style="background:transparent; border:none; padding:0; margin:0;">
                <div class="btn-group">
                  <button class="btn-action" onclick="triggerMaterial('${chap.link}', '${t(chap)}')">
                    <i class="fa-solid fa-file-pdf" style="color:var(--primary-cyan)"></i> Note
                  </button>
                  <button class="btn-action" onclick="triggerMaterial('video', '${t(chap)}')">
                    <i class="fa-brands fa-youtube" style="color:#ef4444"></i> Video
                  </button>
                  <button class="btn-action" onclick="window.location.href='telegram.html'">
                    <i class="fa-brands fa-telegram" style="color:var(--primary-blue)"></i> Doubt
                  </button>
                </div>
              </div>
            `;
          }

          html += `
            <div class="glass-panel chapter-card accordion-card" id="card_${chap.id}">
              <div class="chapter-header" onclick="toggleAccordion('card_${chap.id}')">
                <div class="chapter-title">${t(chap)}</div>
                <i class="fa-solid fa-chevron-down chevron"></i>
              </div>
              <div class="accordion-body">
                <div class="accordion-inner">
                  <div class="content-pad">${innerContent}</div>
                </div>
              </div>
            </div>
          `;
        });
        
        document.getElementById(`${subject}-panel`).innerHTML = html;
      });
    }

    // Toggle Handlers
    window.toggleLang = (l) => { lang = l; renderUI(); document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active')); document.getElementById(`btn-${l}`).classList.add('active'); }
    
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); e.target.classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById(`${e.target.dataset.tab}-panel`).classList.add('active');
      });
    });

    window.toggleAccordion = (cardId) => {
      document.getElementById(cardId).classList.toggle('expanded');
    }

    // Direct Material Trigger
    window.triggerMaterial = (link, titleStr) => {
      if (link === 'video') {
        window.open(`https://www.youtube.com/results?search_query=@Physics_Lover2.O+${titleStr}+class+8`, '_blank');
      } else if (link && link.includes("http")) {
        window.open(link, '_blank');
      } else { 
        showToast(lang==='bn' ? "শিঘ্রই আপলোড হবে!" : "Uploading Soon!"); 
      }
    }

    // Load UI directly
    document.addEventListener("DOMContentLoaded", renderUI);

  </script>
</body>
</html>
