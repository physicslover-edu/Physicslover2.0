<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <title>Class 9 | Physics Lover 2.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* --- Premium Glassmorphism Variables --- */
    :root {
      --bg-color: #050b14;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      
      --primary-cyan: #06b6d4;
      --primary-green: #10b981;
      --primary-gold: #fbbf24;
      --primary-blue: #3b82f6;
      
      --cyan-glow: rgba(6, 182, 212, 0.25);
      --purple-glow: rgba(139, 92, 246, 0.2);
      
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", "Noto Sans Bengali", sans-serif; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-color); color: var(--text-main);
      min-height: 100vh; padding: 15px 15px 90px 15px; overflow-x: hidden; position: relative;
    }

    /* --- Ambient Background Lights --- */
    .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
    .orb-1, .orb-2 { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.6; animation: float 15s infinite alternate ease-in-out; }
    .orb-1 { width: 300px; height: 300px; background: var(--cyan-glow); top: -5%; left: -10%; }
    .orb-2 { width: 300px; height: 300px; background: var(--purple-glow); bottom: 10%; right: -10%; animation-delay: 5s; }
    
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 30px) scale(1.1); }
    }

    /* --- Core Glass Panel --- */
    .glass-panel {
      background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 16px;
    }

    /* --- Header & Lang Switch --- */
    .wrapper { max-width: 900px; margin: 0 auto; position: relative; z-index: 10; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .back-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 8px; cursor: pointer; backdrop-filter: blur(10px);
    }
    .lang-switch { display: flex; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; }
    .lang-btn { background: none; border: none; color: var(--text-muted); padding: 6px 14px; font-size: 0.85rem; font-weight: 600; transition: 0.3s; cursor: pointer; }
    .lang-btn.active { background: var(--primary-cyan); color: #000; }

    /* --- Class Portal Title --- */
    .portal-title {
      font-size: 1.5rem; font-weight: 700; color: var(--primary-cyan); 
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px;
      text-align: center; background: var(--glass-bg); padding: 15px; border-radius: 16px; border: 1px solid var(--glass-border);
    }

    /* --- Subject Tabs --- */
    .nav-tabs { display: flex; gap: 8px; margin-bottom: 25px; }
    .tab {
      flex: 1; text-align: center; padding: 10px 5px; border-radius: 12px; font-size: 0.9rem; font-weight: 600;
      background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); color: var(--text-muted); transition: 0.3s; cursor: pointer;
    }
    .tab.active { background: rgba(6, 182, 212, 0.1); color: #fff; border-color: var(--primary-cyan); }

    /* --- General Accordion --- */
    .accordion-body { display: grid; grid-template-rows: 0fr; transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    .accordion-card.expanded .accordion-body { grid-template-rows: 1fr; }
    .accordion-inner { overflow: hidden; }
    .content-pad { padding: 0 15px 15px 15px; }

    /* --- Chapters & Exams Card Styling --- */
    .panel { display: none; animation: fadeIn 0.4s ease; }
    .panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .chapter-card { margin-bottom: 12px; transition: 0.3s; }
    .chapter-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .chapter-title { font-size: 1rem; font-weight: 600; color: #f8fafc; line-height: 1.4; padding-right: 15px; }
    
    .chevron { transition: 0.3s; color: var(--text-muted); font-size: 1rem; }
    .accordion-card.expanded .chevron { transform: rotate(180deg); color: var(--primary-cyan); }

    .exam-header-style { background: rgba(251, 191, 36, 0.08); border-radius: 16px; }
    .exam-header-style .chapter-title { color: var(--primary-gold); }
    .exam-header-style .chevron { color: var(--primary-gold); }

    /* Inner Topic Box */
    .topic-box { background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; margin-top: 10px; }
    .topic-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 12px; color: #cbd5e1; text-align: center; }

    /* --- Action Buttons (3 Buttons Grid) --- */
    .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
    .btn-action {
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px;
      padding: 12px 5px; color: #fff; font-size: 0.75rem; font-weight: 500;
      display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 6px; cursor: pointer; transition: 0.2s; text-align: center;
    }
    .btn-action i { font-size: 1.15rem; }
    .btn-action:active { transform: scale(0.95); }
    .btn-action:hover { background: rgba(255,255,255,0.1); }
    
    /* --- Direct Mission Button for Anushiloni --- */
    .mission-btn {
      width: 100%; background: linear-gradient(135deg, #10b981, #059669); border: 1px solid rgba(16, 185, 129, 0.5);
      color: #fff; padding: 12px 15px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
    }
    .mission-btn:active { transform: translateY(2px); }
    .mission-btn:hover { box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4); }

    /* --- Toast Notification --- */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 100px);
      background: rgba(15, 23, 42, 0.95); border: 1px solid var(--glass-border); border-radius: 30px;
      padding: 12px 20px; color: #fff; font-size: 0.85rem; font-weight: 500; backdrop-filter: blur(10px);
      display: flex; align-items: center; gap: 10px; z-index: 99999; opacity: 0; transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); width: max-content;
    }
    .toast.show { transform: translate(-50%, 0); opacity: 1; }
  </style>
</head>
<body>
  <div class="ambient-bg">
    <div class="orb-1"></div>
    <div class="orb-2"></div>
  </div>

  <div class="toast" id="appToast">
    <i class="fa-solid fa-bell" style="color: var(--primary-gold)"></i>
    <span id="toastMsg">মেসেজ</span>
  </div>

  <div class="wrapper">
    <div class="header">
      <button class="back-btn" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i> Home</button>
      <div class="lang-switch">
        <button class="lang-btn active" id="btn-bn" onclick="toggleLang('bn')">বাংলা</button>
        <button class="lang-btn" id="btn-en" onclick="toggleLang('en')">EN</button>
      </div>
    </div>

    <div class="portal-title">
      Class 9 Portal
    </div>

    <div class="nav-tabs">
      <div class="tab active" data-tab="physical" id="tab-phy">ভৌতবিজ্ঞান</div>
      <div class="tab" data-tab="life" id="tab-life">জীবনবিজ্ঞান</div>
      <div class="tab" data-tab="onko" id="tab-math">গণিত</div>
    </div>

    <div id="physical-panel" class="panel active"></div>
    <div id="life-panel" class="panel"></div>
    <div id="onko-panel" class="panel"></div>
  </div>

  <script>
    let lang = 'bn';
    
    const currentYear = new Date().getFullYear();
    const examYearDisplay = currentYear < 2026 ? 2026 : currentYear;

    // Updated Class 9 Database with 3 distinct subjects
    const dbCourse = {
      exams: {
        physical: [
          { id: "ps9_ex_1", bn: "১ম সামেটিভ (ভৌতবিজ্ঞান)", en: "1st Summative (Phy. Science)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" },
          { id: "ps9_ex_2", bn: "২য় সামেটিভ (ভৌতবিজ্ঞান)", en: "2nd Summative (Phy. Science)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" },
          { id: "ps9_ex_3", bn: "৩য় সামেটিভ (ভৌতবিজ্ঞান)", en: "3rd Summative (Phy. Science)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" }
        ],
        life: [
          { id: "ls9_ex_1", bn: "১ম সামেটিভ (জীবনবিজ্ঞান)", en: "1st Summative (Life Science)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" },
          { id: "ls9_ex_2", bn: "২য় সামেটিভ (জীবনবিজ্ঞান)", en: "2nd Summative (Life Science)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" },
          { id: "ls9_ex_3", bn: "৩য় সামেটিভ (জীবনবিজ্ঞান)", en: "3rd Summative (Life Science)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" }
        ],
        onko: [
          { id: "m9_ex_1", bn: "১ম সামেটিভ এক্সাম (গণিত)", en: "1st Summative Exam (Math)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" },
          { id: "m9_ex_2", bn: "২য় সামেটিভ এক্সাম (গণিত)", en: "2nd Summative Exam (Math)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" },
          { id: "m9_ex_3", bn: "৩য় সামেটিভ এক্সাম (গণিত)", en: "3rd Summative Exam (Math)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" }
        ]
      },
      physical: [
        { 
          id: "p9_c1", bn: "১) পরিমাপ", en: "1) Measurement",

            { id: "p9_c1_s1", bn: "১.১) ভৌত রাশি ও তার পরিমাপ", en: "1.1) Physical Quantities & Measurement", link: "URL", linkAnu: "URL_ANU" },
            { id: "p9_c1_s2", bn: "১.২) পরিমাপের যন্ত্রসমূহ", en: "1.2) Measuring Instruments", link: "URL", linkAnu: "URL_ANU" }
          ]
        },
        { 
          id: "p9_c2", bn: "২) বল ও গতি", en: "2) Force and Motion",
          topics: [
            { id: "p9_c2_s1", bn: "২.১) স্থিতি ও গতি", en: "2.1) Rest and Motion", link: "URL", linkAnu: "URL_ANU" },
            { id: "p9_c2_s2", bn: "২.২) নিউটনের গতিসূত্র", en: "2.2) Newton's Laws of Motion", link: "URL", linkAnu: "URL_ANU" }
          ]
        },
        { id: "p9_c3", bn: "৩) পদার্থ: গঠন ও ধর্ম", en: "3) Matter: Structure and Properties", link: "URL", linkAnu: "URL_ANU" },
        { id: "p9_c4", bn: "৪) পরমাণুর গঠন ও পদার্থের ভৌত ও রাসায়নিক ধর্ম", en: "4) Atomic Structure & Properties of Matter", link: "URL", linkAnu: "URL_ANU" },
        { id: "p9_c5", bn: "৫) শক্তি ও কার্য", en: "5) Energy and Work", link: "URL", linkAnu: "URL_ANU" },
        { id: "p9_c6", bn: "৬) তাপ", en: "6) Heat", link: "URL", linkAnu: "URL_ANU" },
        { id: "p9_c7", bn: "৭) শব্দ", en: "7) Sound", link: "URL", linkAnu: "URL_ANU" }
      ],
      life: [
        { id: "l9_c1", bn: "১) জীবন ও তার বৈচিত্র্য", en: "1) Life and its Diversity", link: "URL", linkAnu: "URL_ANU" },
        { id: "l9_c2", bn: "২) জীবন সংগঠনের স্তর", en: "2) Levels of Organization of Life", link: "URL", linkAnu: "URL_ANU" },
        { id: "l9_c3", bn: "৩) জৈবনিক প্রক্রিয়া", en: "3) Physiological Processes", link: "URL", linkAnu: "URL_ANU" },
        { id: "l9_c4", bn: "৪) জীববিদ্যা ও মানবকল্যাণ", en: "4) Biology and Human Welfare", link: "URL", linkAnu: "URL_ANU" },
        { id: "l9_c5", bn: "৫) পরিবেশ ও তার সম্পদ", en: "5) Environment and its Resources", link: "URL", linkAnu: "URL_ANU" }
      ],
      onko: [
        { id: "m9_c1", bn: "১) বাস্তব সংখ্যা", en: "1) Real Numbers", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c2", bn: "২) সূচকের নিয়মাবলি", en: "2) Laws of Indices", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c3", bn: "৩) লেখচিত্র", en: "3) Graph", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c4", bn: "৪) স্থানাঙ্ক জ্যামিতি: দূরত্ব নির্ণয়", en: "4) Coordinate Geometry: Distance", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c5", bn: "৫) রৈখিক সহসমীকরণ", en: "5) Linear Simultaneous Equations", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c6", bn: "৬) সামান্তরিকের ধর্ম", en: "6) Properties of Parallelogram", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c7", bn: "৭) বহুপদী সংখ্যামালা", en: "7) Polynomials", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c8", bn: "৮) উৎপাদকে বিশ্লেষণ", en: "8) Factorization", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c9", bn: "৯) ভেদক ও মধ্যবিন্দু সংক্রান্ত উপপাদ্য", en: "9) Transversal and Mid-Point Theorem", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c10", bn: "১০) লাভ ও ক্ষতি", en: "10) Profit and Loss", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c11", bn: "১১) রাশিবিজ্ঞান", en: "11) Statistics", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c12", bn: "১২) ক্ষেত্রফল সংক্রান্ত উপপাদ্য", en: "12) Theorems on Area", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c13", bn: "১৩) সম্পাদ্য", en: "13) Construction", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c14", bn: "১৪) ত্রিভুজ ও চতুর্ভুজের পরিসীমা ও ক্ষেত্রফল", en: "14) Perimeter & Area of Triangles and Quadrilaterals", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c15", bn: "১৫) বৃত্তের পরিধি", en: "15) Circumference of Circle", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c16", bn: "১৬) বৃত্তের ক্ষেত্রফল", en: "16) Area of Circle", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c17", bn: "১৭) সমবিন্দু সংক্রান্ত উপপাদ্য", en: "17) Theorems on Concurrence", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c18", bn: "১৮) স্থানাঙ্ক জ্যামিতি: ত্রিভুজাকৃতি ক্ষেত্রের ক্ষেত্রফল", en: "18) Coordinate Geometry: Area of Triangular Region", link: "URL", linkAnu: "URL_ANU" },
        { id: "m9_c19", bn: "১৯) লগারিদম", en: "19) Logarithm", link: "URL", linkAnu: "URL_ANU" }
      ]
    };

    const t = (obj) => lang === 'bn' ? obj.bn : obj.en;

    window.showToast = (msg) => {
      const toast = document.getElementById('appToast');
      document.getElementById('toastMsg').innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Direct UI Renderer
    function renderUI() {
      ['physical', 'life', 'onko'].forEach(subject => {
        let html = "";
        
        // 1. Render Exams
        let examContent = "";
        dbCourse.exams[subject].forEach(ex => {
          examContent += `
            <div class="topic-box" style="margin-top: 0; margin-bottom: 15px;">
              <div class="topic-name">${t(ex)}</div>
              <div class="btn-group">
                <button class="btn-action" onclick="triggerMaterial('${ex.linkSug}', '${t(ex)}')">
                  <i class="fa-solid fa-book-open" style="color:var(--primary-gold)"></i> Sug ${examYearDisplay}
                </button>
                <button class="btn-action" onclick="triggerMaterial('${ex.linkPyq}', '${t(ex)}')">
                  <i class="fa-solid fa-file-lines" style="color:var(--primary-cyan)"></i> PYQ
                </button>
                <button class="btn-action" onclick="window.location.href='telegram.html'">
                  <i class="fa-brands fa-telegram" style="color:var(--primary-blue)"></i> Doubt
                </button>
              </div>
            </div>
          `;
        });
        
        html += `
          <div class="glass-panel chapter-card accordion-card" id="exam_${subject}" style="border-color: rgba(251, 191, 36, 0.4); margin-bottom: 25px;">
            <div class="chapter-header exam-header-style" onclick="toggleAccordion('exam_${subject}')">
              <div class="chapter-title"><i class="fa-solid fa-file-signature"></i> Summative Exams & PYQ</div>
              <i class="fa-solid fa-chevron-down chevron"></i>
            </div>
            <div class="accordion-body">
              <div class="accordion-inner">
                <div class="content-pad" style="padding-top: 15px;">${examContent}</div>
              </div>
            </div>
          </div>
        `;

        // 2. Render Chapters
        dbCourse[subject].forEach((chap) => {
          let innerContent = "";
          if (chap.topics) {
            chap.topics.forEach(sub => {
              innerContent += `
                <div class="topic-box">
                  <div class="topic-name">${t(sub)}</div>
                  <div class="btn-group">
                    <button class="btn-action" onclick="triggerMaterial('${sub.link}', '${t(sub)}')">
                      <i class="fa-solid fa-file-pdf" style="color:var(--primary-cyan)"></i> Note
                    </button>
                    <button class="btn-action" onclick="triggerMaterial('video', '${t(sub)}')">
                      <i class="fa-brands fa-youtube" style="color:#ef4444"></i> Video
                    </button>
                    <button class="btn-action" onclick="window.location.href='telegram.html'">
                      <i class="fa-brands fa-telegram" style="color:var(--primary-blue)"></i> Doubt
                    </button>
                  </div>
                  <button class="mission-btn" onclick="triggerMaterial('${sub.linkAnu}', '${t(sub)}')">
                    <span style="display:flex; gap:8px; align-items:center;"><i class="fa-solid fa-book"></i> ${lang==='bn'?'অনুশীলনী':'Practice'}</span>
                    <i class="fa-solid fa-circle-play"></i>
                  </button>
                </div>
              `;
            });
          } else {
            innerContent += `
              <div class="topic-box" style="background:transparent; border:none; padding:0; margin:0;">
                <div class="btn-group">
                  <button class="btn-action" onclick="triggerMaterial('${chap.link}', '${t(chap)}')">
                    <i class="fa-solid fa-file-pdf" style="color:var(--primary-cyan)"></i> Note
                  </button>
                  <button class="btn-action" onclick="triggerMaterial('video', '${t(chap)}')">
                    <i class="fa-brands fa-youtube" style="color:#ef4444"></i> Video
                  </button>
                  <button class="btn-action" onclick="window.location.href='telegram.html'">
                    <i class="fa-brands fa-telegram" style="color:var(--primary-blue)"></i> Doubt
                  </button>
                </div>
                <button class="mission-btn" onclick="triggerMaterial('${chap.linkAnu}', '${t(chap)}')">
                  <span style="display:flex; gap:8px; align-items:center;"><i class="fa-solid fa-book"></i> ${lang==='bn'?'অনুশীলনী':'Practice'}</span>
                  <i class="fa-solid fa-circle-play"></i>
                </button>
              </div>
            `;
          }
          html += `
            <div class="glass-panel chapter-card accordion-card" id="card_${chap.id}">
              <div class="chapter-header" onclick="toggleAccordion('card_${chap.id}')">
                <div class="chapter-title">${t(chap)}</div>
                <i class="fa-solid fa-chevron-down chevron"></i>
              </div>
              <div class="accordion-body">
                <div class="accordion-inner">
                  <div class="content-pad">${innerContent}</div>
                </div>
              </div>
            </div>
          `;
        });
        document.getElementById(`${subject}-panel`).innerHTML = html;
      });
    }

    // Toggle Handlers
    window.toggleLang = (l) => { 
      lang = l; 
      renderUI(); 
      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active')); 
      document.getElementById(`btn-${l}`).classList.add('active'); 
      
      // Update Tab Texts Dynamically based on language
      document.getElementById('tab-phy').innerText = l === 'bn' ? 'ভৌতবিজ্ঞান' : 'Phy. Science';
      document.getElementById('tab-life').innerText = l === 'bn' ? 'জীবনবিজ্ঞান' : 'Life Science';
      document.getElementById('tab-math').innerText = l === 'bn' ? 'গণিত' : 'Math';
    }
    
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); e.target.classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById(`${e.target.dataset.tab}-panel`).classList.add('active');
      });
    });

    window.toggleAccordion = (cardId) => {
      document.getElementById(cardId).classList.toggle('expanded');
    }

    // Direct Material Trigger
    window.triggerMaterial = (link, titleStr) => {
      if (link === 'video') {
        window.open(`https://www.youtube.com/results?search_query=@Physics_Lover2.O+${titleStr}+class+9`, '_blank');
      } else if (link && link.includes("http")) {
        window.open(link, '_blank');
      } else { 
        showToast(lang==='bn' ? "শিঘ্রই আপলোড হবে!" : "Uploading Soon!"); 
      }
    }

    // Load UI directly
    document.addEventListener("DOMContentLoaded", renderUI);

  </script>
</body>
</html>
