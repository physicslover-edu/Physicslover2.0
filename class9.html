<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <title>Class 9 | Physics Lover 2.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-glow-1: #0ea5e9;
      --bg-glow-2: #4f46e5;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-cyan: #06b6d4;
      --accent-purple: #a855f7;
    }

    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", "Noto Sans Bengali", sans-serif;
      background: #020617;
      color: #f3f4f6;
      min-height: 100vh;
      padding: 15px 12px;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Ambient Glowing Blobs */
    .bg-glow {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      opacity: 0.25;
      animation: floatGlow 12s infinite alternate ease-in-out;
    }
    .glow-1 { top: -5%; left: -10%; background: var(--bg-glow-1); }
    .glow-2 { bottom: -5%; right: -10%; background: var(--bg-glow-2); animation-delay: 6s; }

    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(20px, 20px) scale(1.1); }
    }

    /* Main Container layout */
    .wrapper {
      position: relative;
      z-index: 10;
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
    }

    .header-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 25px;
      padding-top: 10px;
    }

    /* Glassmorphic Dropdown Menu Container */
    .menu-container {
      position: absolute;
      left: 0;
      z-index: 100;
    }

    .menu-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: #fff;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      transition: all 0.3s ease;
    }
    .menu-btn:hover, .menu-btn:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: 50px;
      left: 0;
      background: rgba(10, 15, 30, 0.85);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 16px;
      width: 170px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      animation: menuEntrance 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .dropdown-menu.show { display: block; }

    @keyframes menuEntrance {
      from { opacity: 0; transform: translateY(-10px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .dropdown-menu a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      color: #e5e7eb;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      transition: all 0.2s ease;
    }
    .dropdown-menu a:last-child { border-bottom: none; }
    .dropdown-menu a:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--accent-cyan);
    }

    .header-title {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    /* Premium Custom Tab Bar (3 Item Grid for Class 9) */
    .tab-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      padding: 6px;
      border-radius: 16px;
      backdrop-filter: blur(20px);
      margin-bottom: 20px;
    }

    .slide-tab {
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      color: #9ca3af;
      background: transparent;
      border: none;
      border-radius: 12px;
      padding: 12px 0;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s ease;
    }

    .slide-tab.active {
      background: rgba(255, 255, 255, 0.07);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Modern Search Bar */
    .search-container {
      position: relative;
      margin-bottom: 20px;
    }

    .search-input {
      width: 100%;
      padding: 13px 16px 13px 42px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      backdrop-filter: blur(20px);
      transition: all 0.3s ease;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent-cyan);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-size: 0.95rem;
    }

    /* Chapter Content Panels */
    .chapter-panel {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 22px;
      padding: 20px 14px;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      display: none;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      animation: cardEntrance 0.4s ease-out;
    }

    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chapter-panel.active { display: block; }

    .panel-headline {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 10px;
    }

    .panel-headline i { color: var(--accent-cyan); }
    .chapter-list { list-style: none; }

    /* Chapter Item Clean Glass Design */
    .chapter-item {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .chapter-head {
      font-size: 0.92rem;
      font-weight: 500;
      line-height: 1.4;
      color: #e5e7eb;
      margin-bottom: 12px;
    }

    .no-results {
      text-align: center;
      color: #9ca3af;
      padding: 20px 0;
      font-size: 0.9rem;
    }

    /* Actions: Multi-Button Grid Layout */
    .action-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .action-btn {
      padding: 10px 2px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #e5e7eb;
      border-radius: 10px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.25s ease;
    }

    .btn-notes:hover {
      background: linear-gradient(135deg, #06b6d4, #2563eb);
      color: #fff;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.25);
      border-color: transparent;
    }

    .btn-video:hover {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
      border-color: transparent;
    }

    .btn-quiz:hover {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.25);
      border-color: transparent;
    }

    .action-btn i { font-size: 1rem; }

    /* Ultra Mobile Optimization */
    @media (max-width: 360px) {
      .header-title { font-size: 1.4rem; }
      .slide-tab { font-size: 0.78rem; padding: 10px 0; }
      .action-btn { font-size: 0.72rem; padding: 8px 1px; }
      .action-btn i { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="wrapper">
    <div class="header-bar">
      <div class="menu-container">
        <button class="menu-btn" id="menuBtn" title="Options Menu">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back</a>
          <a href="telegram.html"><i class="fa-brands fa-telegram"></i> Any Doubt?</a>
        </div>
      </div>
      <div class="header-title">Class 9</div>
    </div>

    <div class="tab-bar">
      <button class="slide-tab active" data-subject="vouto">ভৌত বিজ্ঞান</button>
      <button class="slide-tab" data-subject="jibon">জীবন বিজ্ঞান</button>
      <button class="slide-tab" data-subject="onko">গণিত</button>
    </div>

    <div class="search-container">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input type="text" id="search-input" class="search-input" placeholder="অধ্যায়ের নাম দিয়ে খুঁজুন...">
    </div>

    <div class="chapter-panel active" id="vouto-panel"></div>
    <div class="chapter-panel" id="jibon-panel"></div>
    <div class="chapter-panel" id="onko-panel"></div>
  </div>

  <script>
    // Class 9 Core Chapter Array Database
    const voutoChapters = [
      { name: "১) পরিমাপ", notes: "#", mock: "#" },
      { name: "২) বল ও গতি", notes: "#", mock: "#" },
      { name: "৩) পদার্থঃ গঠন ও ধর্ম", notes: "#", mock: "#" },
      { name: "৪) পদার্থঃ পরমানুর গঠন ও পদার্থের ভৌত ও রাসায়নিক ধর্মসমূহ", notes: "#", mock: "#" },
      { name: "৫) শক্তির ক্রিয়াঃ কার্য, ক্ষমতা ও শক্তি", notes: "#", mock: "#" },
      { name: "৬) তাপ", notes: "#", mock: "#" },
      { name: "৭) শব্দ", notes: "#", mock: "#" }
    ];

    const jibonChapters = [
      { name: "১) জীবন ও তার বৈচিত্র্য", notes: "#", mock: "#" },
      { name: "২) জীবন সংগঠনের স্তর", notes: "#", mock: "#" },
      { name: "৩) জৈবনিক প্রক্রিয়া", notes: "https://drive.google.com/file/d/1U3MX1tnLLHdUNvFjmHCIlzbNn_GVkZt0/view?usp=drivesdk", mock: "#" },
      { name: "৪) জীববিদ্যা ও মানবকল্যাণ", notes: "#", mock: "#" },
      { name: "৫) পরিবেশ ও তার সম্পদ", notes: "#", mock: "#" }
    ];

    const onkoChapters = [
      {name:"১) বাস্তব সংখ্যা", notes: "#", mock: "#"},
      {name:"২) সূচকের নিয়মাবলী", notes: "#", mock: "#"},
      {name:"৩) লেখচিত্র", notes: "#", mock: "#"},
      {name:"৪) স্থানাঙ্ক জ্যামিতি - দূরত্ব নির্ণয়", notes: "#", mock: "#"},
      {name:"৫) রৈখিক সহ সমীকরণ( দুই চল বিশিষ্ট)", notes: "#", mock: "#"},
      {name:"৬) সামান্তরিকের ধর্ম", notes: "#", mock: "#"},
      {name:"৭) বহুপদী সংখ্যামালা", notes: "#", mock: "#"},
      {name:"৮) উৎপাদকের বিশ্লেষণ", notes: "#", mock: "#"},
      {name:"৯) ভেদক ও মধ্যবিন্দু সংক্রান্ত উপপাদ্য", notes: "#", mock: "#"},
      {name:"১০) লাভ ও ক্ষতি", notes: "#", mock: "#"},
      {name:"১১) রাশি বিজ্ঞান", notes: "#", mock: "#"},
      {name:"১২) ক্ষেত্রফল সংক্রান্ত উপপাদ্য", notes: "#", mock: "#"},
      {name:"১৩) সম্পাদ্য: ত্রিভূজের সমান ক্ষেত্রফল বিশিষ্ট সামান্তরিক অঙ্কন করা যায় একটি কোণের পরিমাপ নির্দিষ্ট", notes: "#", mock: "#"},
      {name:"১৪) সম্পাদ্য ; চতুর্ভুজের সমান ক্ষেত্রফল বিশিষ্ট ত্রিভুজ অঙ্কন", notes: "#", mock: "#"},
      {name:"১৫) ত্রিভূজ ও চতুর্ভুজের পরিসীমা ও ক্ষেত্রফল", notes: "#", mock: "#"},
      {name:"১৬) বৃত্তের পরিধি", notes: "#", mock: "#"},
      {name:"১৭) সমবিন্দু সংক্রান্ত উপপাদ্য", notes: "#", mock: "#"},
      {name:"১৮) বৃত্তের ক্ষেত্রফল", notes: "#", mock: "#"},
      {name:"১৯) স্থানাঙ্ক জ্যামিতি : সরলরেখাংশের অন্তর্বিভক্ত ও বহিঃ বিভক্ত", notes: "#", mock: "#"},
      {name:"২০) স্থানাঙ্ক জ্যামিতি: ত্রিভূজাকৃতি ক্ষেত্রের ক্ষেত্রফল", notes: "#", mock: "#"},
      {name:"২১) লগারিদম", notes: "#", mock: "#"}
    ];

    let currentSubject = "vouto";

    function renderChapters(filterText = "") {
      let chapterData;
      let panelId;
      let icon;
      let headlineText;

      // Sync active subject configurations
      if (currentSubject === "vouto") {
        chapterData = voutoChapters;
        panelId = "vouto-panel";
        icon = "fa-atom";
        headlineText = "ভৌত বিজ্ঞান অধ্যায় সমূহ";
      } else if (currentSubject === "jibon") {
        chapterData = jibonChapters;
        panelId = "jibon-panel";
        icon = "fa-dna";
        headlineText = "জীবন বিজ্ঞান অধ্যায় সমূহ";
      } else {
        chapterData = onkoChapters;
        panelId = "onko-panel";
        icon = "fa-calculator";
        headlineText = "গণিতের অধ্যায় সমূহ";
      }

      // Flush non-active nodes to handle layout dynamically
      document.getElementById("vouto-panel").innerHTML = "";
      document.getElementById("jibon-panel").innerHTML = "";
      document.getElementById("onko-panel").innerHTML = "";
      
      let html = `<div class="panel-headline"><i class="fa-solid ${icon}"></i> ${headlineText}</div><ul class="chapter-list">`;
      
      const filteredChapters = chapterData.filter(ch => 
        ch.name.toLowerCase().includes(filterText.toLowerCase())
      );

      if (filteredChapters.length === 0) {
        html += `<li class="no-results"><i class="fa-solid fa-face-frown"></i> কোনো অধ্যায় পাওয়া যায়নি!</li>`;
      } else {
        filteredChapters.forEach((ch) => {
          const isValidNotes = ch.notes && ch.notes.startsWith('http');
          const noteAction = isValidNotes ? `window.open('${ch.notes}', '_blank')` : `alert('এই চ্যাপ্টারের নোট এখনও আপলোড করা হয়নি!')`;

          const isValidQuiz = ch.mock && ch.mock.startsWith('http');
          const quizAction = isValidQuiz ? `window.open('${ch.mock}', '_blank')` : `alert('এই চ্যাপ্টারের মক টেস্ট এখনও প্রস্তুত করা হয়নি!')`;

          // Extraction of numbers to provide a clean automated search lookup
          const cleanChapterName = ch.name.includes(')') ? ch.name.substring(ch.name.indexOf(')') + 1).trim() : ch.name;
          
          // YouTube deep search algorithm tailored strictly for Class 9
          const searchQuery = `@Physics_Lover2.O "Physics Lover 2.0" ${cleanChapterName} ক্লাস 9`;
          const ytSearchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(searchQuery)}`;
          const videoAction = `window.open('${ytSearchUrl}', '_blank')`;

          html += `
            <li class="chapter-item">
              <div class="chapter-head">${ch.name}</div>
              <div class="action-bar">
                <button class="action-btn btn-notes" onclick="${noteAction}">
                  <i class="fa-brands fa-google-drive"></i>নোটস
                </button>
                <button class="action-btn btn-video" onclick="${videoAction}">
                  <i class="fa-brands fa-youtube"></i>প্লেলিস্ট
                </button>
                <button class="action-btn btn-quiz" onclick="${quizAction}">
                  <i class="fa-solid fa-pen-to-square"></i>মক টেস্ট
                </button>
              </div>
            </li>`;
        });
      }
      
      html += `</ul>`;
      document.getElementById(panelId).innerHTML = html;
    }

    // Render Initial State
    renderChapters();

    // 3-way Tab Synchronizer Engine
    const tabs = document.querySelectorAll(".slide-tab");
    const panels = document.querySelectorAll(".chapter-panel");
    const searchInput = document.getElementById("search-input");

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        
        panels.forEach((p) => p.classList.remove("active"));
        
        currentSubject = tab.dataset.subject;
        document.getElementById(`${currentSubject}-panel`).classList.add("active");
        
        searchInput.value = ""; 
        renderChapters();
      });
    });

    // Instant Input Filter Synchronizer
    searchInput.addEventListener("input", (e) => {
      renderChapters(e.target.value);
    });

    // Header Navigation Dropdown System
    const menuBtn = document.getElementById("menuBtn");
    const dropdownMenu = document.getElementById("dropdownMenu");

    menuBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      dropdownMenu.classList.toggle("show");
    });

    document.addEventListener("click", () => {
      dropdownMenu.classList.remove("show");
    });
  </script>
</body>
</html>
