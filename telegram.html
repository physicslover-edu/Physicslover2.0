<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Support | Physics Lover 2.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* GLOBAL APP VARIABLES */
        :root {
            --bg-color: #050b14;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --tg-color: #0ea5e9;
            --tg-glow: rgba(14, 165, 233, 0.2);
            --urgent-color: #e11d48;
            --urgent-glow: rgba(225, 29, 72, 0.2);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent; /* Removes default tap highlight on mobile */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; position: relative; overflow: hidden;
        }

        /* AMBIENT BACKGROUND ORBS */
        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb-1, .orb-2 { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.5; animation: float 10s infinite alternate ease-in-out; }
        .orb-1 { width: 300px; height: 300px; background: var(--tg-glow); top: -5%; left: -5%; }
        .orb-2 { width: 300px; height: 300px; background: var(--urgent-glow); bottom: -5%; right: -5%; animation-delay: 3s; }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 40px) scale(1.1); }
        }

        /* MAIN GLASS CONTAINER */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px 30px;
            width: 100%;
            max-width: 480px; /* Perfect size for PC and responsive for mobile */
            z-index: 10;
            display: flex; flex-direction: column;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER & BACK BUTTON */
        .header-top { display: flex; align-items: center; margin-bottom: 30px; }
        
        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            text-decoration: none; transition: 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); transform: translateX(-4px); }
        .back-btn svg { width: 20px; height: 20px; stroke-width: 2.5; }

        .header-text { margin-left: 15px; }
        .header-text h1 { font-size: 1.6rem; font-weight: 700; color: #fff; line-height: 1.2;}
        .header-text p { font-size: 0.85rem; color: var(--text-muted); font-weight: 500;}

        /* APP-LIKE CLICKABLE CARDS */
        .action-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px; margin-bottom: 15px;
            display: flex; align-items: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden;
            cursor: pointer;
        }
        
        .action-card:last-child { margin-bottom: 0; }

        /* Card Hover & Tap Effects */
        .action-card:hover { transform: translateY(-4px); background: rgba(255, 255, 255, 0.04); }
        .action-card:active { transform: scale(0.96); } /* The App-like Bounce Effect */

        /* Telegram Card Glow */
        .card-tg:hover { border-color: rgba(14, 165, 233, 0.4); box-shadow: 0 10px 25px rgba(14, 165, 233, 0.15); }
        .card-tg .icon-box { background: rgba(14, 165, 233, 0.1); color: var(--tg-color); }
        .card-tg:hover .icon-box { background: var(--tg-color); color: #fff; }

        /* Urgent Card Glow */
        .card-urgent:hover { border-color: rgba(225, 29, 72, 0.4); box-shadow: 0 10px 25px rgba(225, 29, 72, 0.15); }
        .card-urgent .icon-box { background: rgba(225, 29, 72, 0.1); color: var(--urgent-color); }
        .card-urgent:hover .icon-box { background: var(--urgent-color); color: #fff; }

        /* Card Inner Elements */
        .icon-box {
            width: 54px; height: 54px; border-radius: 16px;
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0; margin-right: 18px; transition: 0.3s ease;
        }
        .icon-box svg { width: 26px; height: 26px; stroke-width: 2; fill: none; stroke: currentColor;}

        .card-content { flex-grow: 1; }
        .card-title { color: var(--text-main); font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
        .card-desc { color: var(--text-muted); font-size: 0.85rem; line-height: 1.4; }

        .card-arrow {
            color: #64748b; transition: 0.3s ease;
            display: flex; align-items: center; justify-content: center;
        }
        .card-arrow svg { width: 22px; height: 22px; stroke-width: 2.5; stroke: currentColor; fill: none;}
        .action-card:hover .card-arrow { color: #fff; transform: translateX(5px); }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .glass-panel { padding: 30px 20px; border-radius: 24px; }
            .icon-box { width: 48px; height: 48px; margin-right: 15px; }
            .icon-box svg { width: 22px; height: 22px; }
            .card-title { font-size: 1rem; }
            .card-desc { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg">
        <div class="orb-1"></div>
        <div class="orb-2"></div>
    </div>

    <div class="glass-panel">
        
        <div class="header-top">
            <a href="index.html" class="back-btn" aria-label="Go Back">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <div class="header-text">
                <h1>Help & Support</h1>
                <p>Physics Lover 2.0</p>
            </div>
        </div>

        <a href="https://t.me/+gDPIeoOPAfQ1OGE1" target="_blank" class="action-card card-tg">
            <div class="icon-box">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </div>
            <div class="card-content">
                <div class="card-title">Telegram Group</div>
                <div class="card-desc">Standard doubts & class discussions.</div>
            </div>
            <div class="card-arrow">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </div>
        </a>

        <a href="https://forms.gle/hSaPmc5GivgBgfVa8" target="_blank" class="action-card card-urgent">
            <div class="icon-box">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
            </div>
            <div class="card-content">
                <div class="card-title">Urgent Request</div>
                <div class="card-desc">Priority help for exam notes & PYQs.</div>
            </div>
            <div class="card-arrow">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </div>
        </a>

    </div>

</body>
</html>
