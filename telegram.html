<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Doubt | Physics Lover 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Theme Sync Script -->
    <script>
        const savedTheme = localStorage.getItem('theme'); 
        if (savedTheme === 'light' || savedTheme === 'light-mode') {
            document.documentElement.classList.add('light-mode');
        }
    </script>

    <style>
        :root {
            /* 🌙 Dark Mode */
            --bg-color: #09090b; /* Very dark zinc */
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent-1: #38bdf8; /* Cyan */
            --accent-2: #818cf8; /* Indigo */
            --btn-bg: rgba(255, 255, 255, 0.08);
            --btn-hover: rgba(255, 255, 255, 0.15);
        }

        html.light-mode {
            /* ☀️ Light Mode */
            --bg-color: #ffffff;
            --text-main: #09090b;
            --text-muted: #52525b;
            --btn-bg: rgba(0, 0, 0, 0.05);
            --btn-hover: rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* 🔙 Top Bar & Back Button */
        .top-bar {
            padding: 20px 24px;
            display: flex;
            justify-content: flex-start;
            width: 100%;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            background: var(--btn-bg);
            padding: 10px 18px;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: var(--btn-hover);
            color: var(--text-main);
        }

        .back-btn svg { width: 18px; height: 18px; }

        /* 📱 Main App Content (Centered) */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        /* App Branding */
        .app-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-weight: 500;
        }

        /* 🕒 Circular Premium Timer */
        .timer-container {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .spinning-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--accent-1);
            border-right-color: var(--accent-2);
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.15);
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .timer-text {
            font-size: 4rem;
            font-weight: 800;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
            z-index: 2;
        }

        /* 💬 Open Chat Button */
        .chat-btn {
            display: none; /* Hidden until timer ends */
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: #fff;
            border: none;
            padding: 16px 32px;
            border-radius: 100px; /* Pill shape */
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            align-items: center;
            gap: 10px;
            font-family: inherit;
        }

        .chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(129, 140, 248, 0.4);
        }

        .chat-btn svg { width: 22px; height: 22px; }

        /* ⚖️ Legal Footer */
        .footer {
            padding: 20px 24px 30px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.5;
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <a href="index.html" class="back-btn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path>
            </svg>
            Back
        </a>
    </div>

    <!-- Main Centered Content -->
    <div class="main-content">
        
        <h1 class="app-title">Physics Lover 2.0</h1>
        <p class="subtitle" id="statusMessage">Preparing Doubt Desk...</p>

        <!-- Premium Timer -->
        <div class="timer-container" id="timerWrapper">
            <div class="spinning-ring"></div>
            <div class="timer-text" id="countDown">10</div>
        </div>

        <!-- Re-open Chat Button -->
        <button class="chat-btn" id="openChatBtn" onclick="openTawkChat()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
            </svg>
            Open Live Chat
        </button>
    </div>

    <!-- Legal Footer -->
    <div class="footer">
        <strong>Notice:</strong> This section redirects you to our official <em>Tawk.to</em> integration. By continuing, you agree to interact with our academic support team.
    </div>

    <script type="text/javascript">
        // Tawk.to API Setup
        var Tawk_API = Tawk_API || {};
        
        Tawk_API.onLoad = function(){
            Tawk_API.hideWidget();
        };

        (function(){
            var s1 = document.createElement("script"), s0 = document.getElementsByTagName("script")[0];
            s1.async = true;
            s1.src = 'https://embed.tawk.to/6a5097b78926201d475f50e1/default';
            s1.charset = 'UTF-8';
            s1.setAttribute('crossorigin', '*');
            s0.parentNode.insertBefore(s1, s0);
        })();

        // Timer Logic (10 seconds)
        var timeLeft = 10;
        var timerElement = document.getElementById("countDown");
        var timerWrapper = document.getElementById("timerWrapper");
        var openChatBtn = document.getElementById("openChatBtn");
        var statusMessage = document.getElementById("statusMessage");

        function openTawkChat() {
            try {
                Tawk_API.showWidget();
                Tawk_API.maximize();
            } catch (e) {
                console.log("Chat loading...");
            }
        }

        var timer = setInterval(function() {
            timeLeft--;
            
            if (timeLeft > 0) {
                timerElement.innerHTML = timeLeft;
            } else {
                clearInterval(timer);
                
                // UI changes after 10 seconds
                timerWrapper.style.display = "none";
                statusMessage.innerHTML = "Doubt Desk is Ready!";
                statusMessage.style.color = "var(--accent-1)";
                openChatBtn.style.display = "flex";
                
                // Auto open chat
                openTawkChat();
            }
        }, 1000);
    </script>
</body>
</html>
