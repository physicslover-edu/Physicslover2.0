<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ask Doubt | Physics Lover 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --tg-color: #0ea5e9; --text-main: #f8fafc; }
        body { background-color: #05070f; color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .glass-panel { background: rgba(10, 15, 30, 0.45); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 30px; width: 100%; max-width: 450px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 0.85rem; margin-bottom: 6px; color: #cbd5e1; font-weight: 600; }
        .form-control { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; color: #fff; outline: none; }
        .math-toolbar { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }
        .math-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #22d3ee; padding: 4px 8px; font-size: 0.85rem; border-radius: 6px; cursor: pointer; }
        .submit-btn { width: 100%; background: linear-gradient(135deg, #0ea5e9, #0284c7); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<div class="glass-panel">
    <h2 style="margin-bottom: 20px; font-size: 1.35rem;">Doubt Support Desk</h2>
    <form id="doubtForm" onsubmit="redirectToTelegram(event)">
        <div class="form-group"><label class="form-label">Student Name</label><input type="text" id="stuName" class="form-control" required autocomplete="off"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="form-group"><label class="form-label">Class</label><select id="stuClass" class="form-control" onchange="updateSubjects()" required>
                <option value="" disabled selected>Select Class</option>
                <option value="Class 7">Class 7</option><option value="Class 8">Class 8</option>
                <option value="Class 9">Class 9</option><option value="Class 10">Class 10</option>
                <option value="Class 11">Class 11</option><option value="Class 12">Class 12</option>
            </select></div>
            <div class="form-group"><label class="form-label">Subject</label><select id="stuSubject" class="form-control" required disabled></select></div>
        </div>
        <div class="form-group"><label class="form-label">Chapter / Topic Name</label><input type="text" id="stuTopic" class="form-control" required autocomplete="off"></div>
        <div class="form-group">
            <label class="form-label">Your Doubt / Question</label>
            <div class="math-toolbar">
                <button type="button" class="math-btn" onclick="insertMath('√(')">√</button>
                <button type="button" class="math-btn" onclick="insertMath('/')">/</button>
                <button type="button" class="math-btn" onclick="insertMath('²')">x²</button>
                <button type="button" class="math-btn" onclick="insertMath('³')">x³</button>
                <button type="button" class="math-btn" onclick="insertMath('π')">π</button>
                <button type="button" class="math-btn" onclick="insertMath('θ')">θ</button>
            </div>
            <textarea id="stuDoubt" class="form-control" style="min-height: 100px;" required></textarea>
        </div>
        <button type="submit" class="submit-btn">Open Telegram to Send <i class="fa-solid fa-paper-plane"></i></button>
    </form>
</div>

<script>
    function updateSubjects() {
        const cls = document.getElementById('stuClass').value;
        const sub = document.getElementById('stuSubject');
        sub.disabled = false;
        sub.innerHTML = ['Class 7', 'Class 8', 'Class 9', 'Class 10'].includes(cls) ? 
            '<option value="Science">Science</option><option value="Mathematics">Mathematics</option>' : 
            '<option value="Physics">Physics</option>';
    }

    function insertMath(symbol) {
        const txtArea = document.getElementById('stuDoubt');
        txtArea.value += symbol;
        txtArea.focus();
    }

    function redirectToTelegram(event) {
        event.preventDefault();
        
        const name = document.getElementById('stuName').value;
        const cls = document.getElementById('stuClass').value;
        const subject = document.getElementById('stuSubject').value;
        const topic = document.getElementById('stuTopic').value;
        const doubt = document.getElementById('stuDoubt').value;

        // প্রফেশনাল মেসেজ ফরম্যাট যা স্টুডেন্ট বটের মাধ্যমে গ্রুপে পাঠাবে
        const textMessage = `━━━━━━━━━━━━━━━━━━━━\n🛑 NEW DOUBT RECEIVED 🛑\n━━━━━━━━━━━━━━━━━━━━\n👤 Student: ${name}\n🏫 Class: ${cls}\n📚 Subject: ${subject}\n📖 Topic: ${topic}\n\n❓ Doubt Details:\n${doubt}\n━━━━━━━━━━━━━━━━━━━━`;
        
        // আপনার বটের ইউজারনেম (এখানে @ ছাড়া শুধু নামটা দিতে হবে)
        const botUsername = "Physics_Lover_Subhajit_bot"; 
        
        // টেলিগ্রাম ডিপ লিঙ্কিং ইউআরএল (টোকেন ছাড়া ১০০% নিরাপদ)
        const telegramUrl = `https://t.me/${botUsername}?text=${encodeURIComponent(textMessage)}`;
        
        // স্টুডেন্টকে সরাসরি টেলিগ্রামে পাঠিয়ে দেওয়া
        window.location.href = telegramUrl;
    }
</script>
</body>
</html>
