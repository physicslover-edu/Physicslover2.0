<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Expert | Physics Lover 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Theme Sync Script -->
    <script>
        try {
            const savedTheme = localStorage.getItem('pl_theme') || localStorage.getItem('theme'); 
            if (savedTheme === 'light' || savedTheme === 'light-mode') {
                document.documentElement.classList.add('light-mode');
            }
        } catch(e) {}
    </script>

    <style>
        :root {
            /* Dark Mode (Default) - Matching Home Page */
            --bg-base: #07090E; 
            --text-main: #FFFFFF;
            --text-muted: #94A3B8;
            --primary: #3B82F6;
            --primary-light: #60A5FA;
            --primary-dark: rgba(59, 130, 246, 0.15);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --timer-bg: rgba(14, 20, 36, 0.7);
        }

        html.light-mode {
            /* Light Mode */
            --bg-base: #F3F4F6;
            --text-main: #111827;
            --text-muted: #4B5563;
            --primary: #2563EB;
            --primary-light: #3B82F6;
            --primary-dark: rgba(37, 99, 235, 0.15);
            --btn-bg: rgba(0, 0, 0, 0.05);
            --glass-border: rgba(0, 0, 0, 0.1);
            --timer-bg: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Poppins', sans-serif; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* Ambient Background Effects */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, var(--primary-dark), transparent 60%);
            z-index: 0;
            pointer-events: none;
            transition: background 0.4s ease;
            animation: pulseGlow 4s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.7; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        /* 🔙 Top Navigation */
        .top-nav {
            padding: 20px 24px;
            position: relative;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 600;
            background: var(--btn-bg);
            padding: 10px 18px;
            border-radius: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--primary-dark);
            color: var(--primary-light);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.2);
        }

        /* 📱 Main App Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        /* 🌀 3D Rotating Rings Animation */
        .spinner-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 600px;
        }

        .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--primary);
            border-bottom-color: var(--primary);
            animation: spin3D 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            filter: drop-shadow(0 0 10px var(--primary));
        }

        .ring:nth-child(2) {
            width: 80%;
            height: 80%;
            border-top-color: var(--primary-light);
            border-bottom-color: var(--primary-light);
            animation-duration: 2.5s;
            animation-direction: reverse;
        }

        .ring:nth-child(3) {
            width: 60%;
            height: 60%;
            border-top-color: rgba(59, 130, 246, 0.5);
            border-bottom-color: rgba(59, 130, 246, 0.5);
            animation-duration: 3s;
        }
        
        .core-icon {
            font-size: 2rem;
            color: var(--primary-light);
            animation: pulseCore 2s ease-in-out infinite;
        }

        @keyframes spin3D {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }
        
        @keyframes pulseCore {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; text-shadow: 0 0 20px var(--primary-light); }
        }

        /* 📝 Text Styles */
        .title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 500;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
            animation-delay: 0.1s;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ⏳ Timer Pill Box */
        .timer-pill {
            background: var(--timer-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 16px 32px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-bottom: 20px;
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            transform: scale(0.8);
            animation-delay: 0.3s;
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }

        .timer-pill i {
            color: var(--primary-light);
            font-size: 1.4rem;
            animation: swingingTick 2s infinite ease-in-out;
        }

        @keyframes swingingTick {
            0% { transform: rotate(-20deg); }
            50% { transform: rotate(20deg); }
            100% { transform: rotate(-20deg); }
        }

        .timer-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-light);
            letter-spacing: 0.5px;
            font-variant-numeric: tabular-nums;
        }

        /* 💬 Open Chat Button */
        .chat-btn {
            display: none;
            background: linear-gradient(135deg, #1E3A8A, #3B82F6);
            color: #fff;
            border: none;
            padding: 18px 40px;
            border-radius: 40px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
            align-items: center;
            gap: 12px;
            font-family: inherit;
        }

        .chat-btn:active { transform: scale(0.95); }
        .chat-btn:hover { 
            box-shadow: 0 15px 40px rgba(37, 99, 235, 0.6); 
            transform: translateY(-3px);
            background: linear-gradient(135deg, #1E40AF, #60A5FA);
        }
        
        .chat-btn i {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
            60% { transform: translateY(-3px); }
        }

        /* Ready State Animation */
        .ready-animation {
            animation: celebrate 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes celebrate {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

    <!-- Ambient Background Effects -->
    <div class="ambient-glow"></div>

    <!-- Top Bar with Dropdown -->
    <div class="top-nav">
        <a href="index.html" class="back-btn" id="backBtn">
            <i class="fa-solid fa-chevron-left"></i> Back
        </a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        
        <!-- Advanced 3D Spinner -->
        <div class="spinner-container" id="loadingSpinner">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <i class="fa-solid fa-bolt core-icon"></i>
        </div>

        <h1 class="title" id="statusTitle">Connecting...</h1>
        <p class="subtitle" id="statusSubtitle">Connecting to Physics Lover 2.0 doubt support...</p>

        <!-- Wait Timer Pill -->
        <div class="timer-pill" id="timerPill">
            <i class="fa-solid fa-hourglass-half"></i>
            <span class="timer-text" id="countDownText">Starting in 10s</span>
        </div>

        <!-- Live Chat Button (Shows when ready) -->
        <button class="chat-btn" id="openChatBtn" onclick="openTawkChat()">
            <i class="fa-solid fa-comments"></i> Enter Live Chat
        </button>

    </div>

    <script type="text/javascript">
        // --- Tawk.to API Setup ---
        var Tawk_API = Tawk_API || {};
        
        Tawk_API.onLoad = function(){
            Tawk_API.hideWidget();
        };

        Tawk_API.onChatMinimized = function(){
            Tawk_API.hideWidget(); 
        };
        Tawk_API.onChatHidden = function(){
            Tawk_API.hideWidget();
        };

        (function(){
            var s1 = document.createElement("script"), s0 = document.getElementsByTagName("script")[0];
            s1.async = true;
            s1.src = 'https://embed.tawk.to/6a5097b78926201d475f50e1/default';
            s1.charset = 'UTF-8';
            s1.setAttribute('crossorigin', '*');
            s0.parentNode.insertBefore(s1, s0);
        })();

        // --- Advanced Timer Logic (10 seconds) ---
        var timeLeft = 10;
        var timerText = document.getElementById("countDownText");
        var timerPill = document.getElementById("timerPill");
        var openChatBtn = document.getElementById("openChatBtn");
        var statusTitle = document.getElementById("statusTitle");
        var statusSubtitle = document.getElementById("statusSubtitle");
        var spinner = document.getElementById("loadingSpinner");

        function openTawkChat() {
            try {
                Tawk_API.showWidget();
                Tawk_API.maximize();
            } catch (e) {
                console.log("Chat loading...");
            }
        }

        var timer = setInterval(function() {
            timeLeft--;
            
            if (timeLeft > 0) {
                timerText.innerHTML = "Starting in " + timeLeft + "s";
                
                // Update subtitle text dynamically for better UX
                if(timeLeft === 7) {
                    statusSubtitle.innerHTML = "just few seconds...";
                } else if(timeLeft === 4) {
                    statusSubtitle.innerHTML = "Almost there... Setting up chat.";
                } else if(timeLeft === 2) {
                    statusSubtitle.innerHTML = "Ready to connect.";
                }
                
            } else {
                clearInterval(timer);
                
                // Transition UI after 10 seconds
                timerPill.style.display = "none";
                spinner.style.display = "none";
                
                statusTitle.innerHTML = "Connection Ready!";
                statusTitle.style.color = "var(--primary-light)";
                statusTitle.classList.add('ready-animation');
                
                statusSubtitle.innerHTML = "Click below to begin your conversation.";
                statusSubtitle.classList.add('ready-animation');
                
                openChatBtn.style.display = "inline-flex";
                openChatBtn.classList.add('ready-animation');
                
                // Automatically open chat box
                openTawkChat();
            }
        }, 1000);
    </script>
</body>
</html>
