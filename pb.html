<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <title>প্রশ্ন বিচিত্রা সমাধান | Physics Lover 2.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Google Fonts & FontAwesome -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-hover-bg: rgba(255, 255, 255, 0.06);
      --glass-hover-border: rgba(255, 255, 255, 0.18);
      
      /* Glowing Colors */
      --glow-cyan: #06b6d4;
      --glow-pink: #d946ef;
      --glow-gold: #facc15;
      --glow-green: #10b981;
      --yt-red: #ef4444;
    }

    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans Bengali', sans-serif;
      background: #05070f;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
      overflow-x: hidden;
      position: relative;
    }

    /* ─── ব্যাকগ্রাউন্ড নিওন গ্লো অরবিট ─── */
    .mesh-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(130px);
      z-index: 0;
      opacity: 0.22;
      pointer-events: none;
      animation: floatMotion 12s infinite alternate ease-in-out;
    }
    .glow-1 { width: 380px; height: 380px; top: -5%; left: -5%; background: var(--glow-pink); }
    .glow-2 { width: 420px; height: 420px; bottom: -10%; right: -5%; background: var(--glow-cyan); animation-delay: 3s; }
    .glow-3 { width: 320px; height: 320px; top: 35%; left: 45%; background: var(--glow-gold); animation-delay: 6s; }

    @keyframes floatMotion {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.12); }
    }

    /* ─── মেইন গ্লাস ফ্রেম কন্টেইনার ─── */
    .glass-container {
      position: relative;
      z-index: 10;
      max-width: 580px;
      width: 100%;
      background: rgba(10, 15, 30, 0.45);
      backdrop-filter: blur(30px) saturate(190%);
      -webkit-backdrop-filter: blur(30px) saturate(190%);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 32px 26px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      animation: containerReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes containerReveal {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── হেডার এবং ট্রান্সলেটর বাটন ─── */
    .glass-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 20px;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-circle {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: #fff;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .back-circle:hover {
      background: var(--glass-hover-bg);
      border-color: var(--glow-gold);
      color: var(--glow-gold);
      transform: translateX(-3px);
    }

    .header-info h2 {
      font-size: 1.45rem;
      font-weight: 700;
      background: linear-gradient(120deg, #fff 50%, rgba(255,255,255,0.7));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-info p {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 2px;
    }

    /* আল্ট্রা-প্রো ল্যাঙ্গুয়েজ টগল বাটন */
    .lang-toggle-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      padding: 8px 14px;
      border-radius: 12px;
      color: var(--glow-gold);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s ease;
    }
    .lang-toggle-btn:hover {
      background: rgba(255, 255, 255, 0.09);
      border-color: var(--glow-cyan);
      color: #fff;
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
    }

    /* ─── সাবজেক্ট গ্রিড লেআউট ─── */
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 20px;
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .glass-card:hover {
      background: var(--glass-hover-bg);
      border-color: var(--glass-hover-border);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }

    /* কার্ডের ভেতরের টপ টাইটেল পার্ট */
    .card-top-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .icon-wrapper {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .c7 .icon-wrapper { color: var(--glow-pink); }
    .c8 .icon-wrapper { color: var(--glow-cyan); }
    .c9 .icon-wrapper { color: var(--glow-gold); }
    .c10 .icon-wrapper { color: var(--glow-green); }

    .class-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #ffffff;
    }

    /* সাবজেক্ট বাটনের গ্রুপ কন্টেইনার */
    .subjects-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
    }

    /* প্রিমিয়াম প্লেলিস্ট বাটন স্টাইল */
    .subj-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 14px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      color: #cbd5e1;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .subj-btn i {
      font-size: 0.95rem;
      transition: transform 0.3s ease;
    }

    /* সাবজেক্ট অনুযায়ী আকর্ষণীয় হোভার লাইটিং */
    .subj-btn.math:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-color: transparent; color: #fff;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
    }
    .subj-btn.science:hover {
      background: linear-gradient(135deg, #059669, #047857);
      border-color: transparent; color: #fff;
      box-shadow: 0 8px 20px rgba(5, 150, 105, 0.35);
    }
    .subj-btn.p-science:hover {
      background: linear-gradient(135deg, #d97706, #b45309);
      border-color: transparent; color: #fff;
      box-shadow: 0 8px 20px rgba(217, 119, 6, 0.35);
    }
    .subj-btn.l-science:hover {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border-color: transparent; color: #fff;
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.35);
    }

    .subj-btn:hover i {
      transform: scale(1.15);
    }

    /* মোবাইল স্ক্রিন অপ্টিমাইজেশন */
    @media (max-width: 480px) {
      .glass-container { padding: 22px 16px; border-radius: 26px; }
      .glass-header { flex-direction: row; align-items: center; margin-bottom: 22px; }
      .header-info h2 { font-size: 1.25rem; }
      .subjects-group { grid-template-columns: 1fr; } /* মোবাইলে বাটনগুলো নিচে নিচে সুন্দর করে সাজাবে */
      .subj-btn { padding: 12px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <!-- Ambient Background Mesh Blobs -->
  <div class="mesh-glow glow-1"></div>
  <div class="mesh-glow glow-2"></div>
  <div class="mesh-glow glow-3"></div>

  <!-- Main UI Container -->
  <div class="glass-container">
    
    <!-- Top Header Layout -->
    <div class="glass-header">
      <div class="header-left">
        <div class="back-circle" onclick="window.location.href='index.html'">
          <i class="fa-solid fa-chevron-left"></i>
        </div>
        <div class="header-info">
          <h2 data-bn="প্রশ্ন বিচিত্রা সমাধান" data-en="Question Bank Solutions">প্রশ্ন বিচিত্রা সমাধান</h2>
          <p data-bn="বিষয় ভিত্তিক অফিশিয়াল ভিডিও প্লেলিস্ট" data-en="Subject-wise Official Video Playlists">বিষয় ভিত্তিক অফিশিয়াল ভিডিও প্লেলিস্ট</p>
        </div>
      </div>
      
      <!-- ল্যাঙ্গুয়েজ চেঞ্জার বাটন -->

      </div>

      <div class="glass-card c8">
        <div class="card-top-bar">
          <div class="icon-wrapper"><i class="fa-solid fa-atom"></i></div>
          <div class="class-title" data-bn="Class 8 সমাধান" data-en="Class 8 Solutions">Class 8 সমাধান</div>
        </div>
        <div class="subjects-group">
          <a href="এখানে_গণিত_লিংক" target="_blank" class="subj-btn math">
            <i class="fa-solid fa-calculator"></i> <span data-bn="গণিত" data-en="Mathematics">গণিত</span>
          </a>
          <a href="এখানে_বিজ্ঞান_লিংক" target="_blank" class="subj-btn science">
            <i class="fa-solid fa-flask"></i> <span data-bn="বিজ্ঞান" data-en="Science">বিজ্ঞান</span>
          </a>

      </div>

      <!-- Class 9 Card (Math + Phys Sci + Life Sci) -->
      <div class="glass-card c9">
        <div class="card-top-bar">
          <div class="icon-wrapper"><i class="fa-solid fa-flask-vial"></i></div>
          <div class="class-title" data-bn="Class 9 সমাধান" data-en="Class 9 Solutions">Class 9 সমাধান</div>
        </div>
        <div class="subjects-group">
          <a href="এখানে_গণিত_লিংক" target="_blank" class="subj-btn math">
            <i class="fa-solid fa-calculator"></i> <span data-bn="গণিত" data-en="Mathematics">গণিত</span>
          </a>
          <a href="এখানে_ভৌত_বিজ্ঞান_লিংক" target="_blank" class="subj-btn p-science">
            <i class="fa-solid fa-bolt"></i> <span data-bn="ভৌত বিজ্ঞান" data-en="Physical Science">ভৌত বিজ্ঞান</span>
          </a>
          <a href="এখানে_জীবন_বিজ্ঞান_লিংক" target="_blank" class="subj-btn l-science">

          </a>

      </div>

      <!-- Class 10 Card (Math + Phys Sci + Life Sci) -->
      <div class="glass-card c10">
        <div class="card-top-bar">
          <div class="icon-wrapper"><i class="fa-solid fa-brain"></i></div>
          <div class="class-title" data-bn="Class 10 সমাধান" data-en="Class 10 Solutions">Class 10 সমাধান</div>
        </div>
        <div class="subjects-group">
          <a href="এখানে_গণিত_লিংক" target="_blank" class="subj-btn math">
            <i class="fa-solid fa-calculator"></i> <span data-bn="গণিত" data-en="Mathematics">গণিত</span>
          </a>
          <a href="এখানে_ভৌত_বিজ্ঞান_লিংক" target="_blank" class="subj-btn p-science">

          </a>
        </div>
      </div>

    </div>
  </div>

  <!-- Real-time Translation System Logic -->
  <script>
    let currentLang = 'bn'; // ডিফল্ট ভাষা বাংলা

    function toggleLanguage() {
      const translatableElements = document.querySelectorAll('[data-bn]');
      const langTextBtn = document.getElementById('langText');

      if (currentLang === 'bn') {
        // বাংলা থেকে ইংরেজিতে রূপান্তর
        translatableElements.forEach(el => {
          el.textContent = el.getAttribute('data-en');
        });
        langTextBtn.textContent = 'বাংলা';
        currentLang = 'en';
      } else {
        // ইংরেজি থেকে বাংলায় রূপান্তর
        translatableElements.forEach(el => {
          el.textContent = el.getAttribute('data-bn');
        });
        langTextBtn.textContent = 'English';
        currentLang = 'bn';
      }
    }
  </script>

</body>
</html>
