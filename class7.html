<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <title>Class 7 | Physics Lover 2.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Google Fonts & FontAwesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-glow-1: #1e3a8a;
      --bg-glow-2: #6d28d9;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-cyan: #06b6d4;
      --accent-purple: #a855f7;
    }

    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", "Noto Sans Bengali", sans-serif;
      background: #030712;
      color: #f3f4f6;
      min-height: 100vh;
      padding: 15px 12px; /* Optimized mobile padding */
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Ambient Glowing Blobs */
    .bg-glow {
      position: absolute;
      width: 300px; /* Reduced blob size for mobile performance */
      height: 300px;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      opacity: 0.3;
      animation: floatGlow 12s infinite alternate ease-in-out;
    }
    .glow-1 { top: -5%; left: -10%; background: var(--bg-glow-1); }
    .glow-2 { bottom: -5%; right: -10%; background: var(--bg-glow-2); animation-delay: 6s; }

    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(20px, 20px) scale(1.1); }
    }

    /* Main Container layout */
    .wrapper {
      position: relative;
      z-index: 10;
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
    }

    .header-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 25px;
      padding-top: 10px;
    }

    /* Glassmorphic Dropdown Menu Container */
    .menu-container {
      position: absolute;
      left: 0;
      z-index: 100;
    }

    .menu-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: #fff;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      transition: all 0.3s ease;
    }
    .menu-btn:hover, .menu-btn:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: 50px;
      left: 0;
      background: rgba(10, 15, 30, 0.8);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 16px;
      width: 170px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      animation: menuEntrance 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .dropdown-menu.show {
      display: block;
    }

    @keyframes menuEntrance {
      from { opacity: 0; transform: translateY(-10px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .dropdown-menu a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      color: #e5e7eb;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      transition: all 0.2s ease;
    }
    .dropdown-menu a:last-child {
      border-bottom: none;
    }
    .dropdown-menu a:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--accent-cyan);
    }

    .header-title {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    /* Premium Custom Tab Bar */
    .tab-bar {
      display: flex;
      gap: 8px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      padding: 6px;
      border-radius: 16px;
      backdrop-filter: blur(20px);
      margin-bottom: 20px;
    }

    .slide-tab {
      flex: 1;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      color: #9ca3af;
      background: transparent;
      border: none;
      border-radius: 12px;
      padding: 12px 0;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .slide-tab.active {
      background: rgba(255, 255, 255, 0.07);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Modern Search Bar */
    .search-container {
      position: relative;
      margin-bottom: 20px;
    }

    .search-input {
      width: 100%;
      padding: 13px 16px 13px 42px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      backdrop-filter: blur(20px);
      transition: all 0.3s ease;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent-cyan);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-size: 0.95rem;
    }

    /* Chapter Content Panels */
    .chapter-panel {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 22px;
      padding: 20px 14px;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      display: none;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      animation: cardEntrance 0.4s ease-out;
    }

    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chapter-panel.active { display: block; }

    .panel-headline {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 10px;
    }

    .panel-headline i { color: var(--accent-cyan); }

    .chapter-list { list-style: none; }

    /* Chapter Item Clean Glass Design */
    .chapter-item {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .chapter-head {
      font-size: 0.92rem;
      font-weight: 500;
      line-height: 1.4;
      color: #e5e7eb;
      margin-bottom: 12px;
    }

    .no-results {
      text-align: center;
      color: #9ca3af;
      padding: 20px 0;
      font-size: 0.9rem;
    }

    /* Actions: Multi-Button Grid Layout */
    .action-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .action-btn {
      padding: 10px 2px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #e5e7eb;
      border-radius: 10px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.25s ease;
    }

    .btn-notes:hover {
      background: linear-gradient(135deg, #06b6d4, #2563eb);
      color: #fff;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.25);
      border-color: transparent;
    }

    .btn-video:hover {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
      border-color: transparent;
    }

    .btn-quiz:hover {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.25);
      border-color: transparent;
    }

    .action-btn i { font-size: 1rem; }

    /* Ultra Mobile Optimization (Screens under 360px) */
    @media (max-width: 360px) {
      .header-title { font-size: 1.4rem; }
      .slide-tab { font-size: 0.85rem; padding: 10px 0; }
      .action-btn { font-size: 0.72rem; padding: 8px 1px; }
      .action-btn i { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="wrapper">
    <!-- Header Bar -->
    <div class="header-bar">
      <!-- Glassmorphic Options Dropdown Menu -->
      <div class="menu-container">
        <button class="menu-btn" id="menuBtn" title="Options Menu">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="index.html">
            <i class="fa-solid fa-arrow-left"></i> Back
          </a>
          <a href="telegram.html">
            <i class="fa-brands fa-telegram"></i> Any Doubt?
          </a>
        </div>
      </div>
      <div class="header-title">Class 7</div>
    </div>

    <!-- Subject Tabs Selector -->
    <div class="tab-bar">
      <button class="slide-tab active" data-subject="paribesh">পরিবেশ ও বিজ্ঞান</button>
      <button class="slide-tab" data-subject="onko">গণিত</button>
    </div>

    <!-- Live Search Bar -->
    <div class="search-container">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input type="text" id="search-input" class="search-input" placeholder="অধ্যায়ের নাম দিয়ে খুঁজুন...">
    </div>

    <!-- Environment Panel -->
    <div class="chapter-panel active" id="paribesh-panel"></div>

    <!-- Math Panel -->
    <div class="chapter-panel" id="onko-panel"></div>
  </div>

  <script>
    const paribeshChapters = [
      {name: "১) ভৌত পরিবেশ (তাপ, আলো, চুম্বক, তড়িৎ, পরিবেশবান্ধব শক্তি)", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "২) সময় ও গতি", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "৩) পরমানু, অনু ও রাসায়নিক বিক্রিয়া", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "৪) পরিবেশ গঠনে পদার্থের ভূমিকা", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "৫) মানুষের খাদ্য", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "৬) পরিবেশের সজীব উপাদানের গঠনগত বৈচিত্র্য ও কার্যগত প্রক্রিয়া", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "৭) পরিবেশের সংকট, উদ্ভিদ ও পরিবেশের সংরক্ষণ", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "৮) পরিবেশ ও জনস্বাস্থ্য", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"}
    ];

    const onkoChapters = [
      {name: "১) পূর্বপাঠের পুনরালোচনা", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "২) অনুপাত", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "৩) সমানুপাত", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "৪) পূর্ণসংখ্যার যোগ, বিয়োগ,গুণ ও ভাগ", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "৫) সূচকের ধারণা", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "৬) বীজগাণিতিক প্রক্রিয়া", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "৭) কম্পাসের সাহায্যে নির্দিষ্ট কোণ অঙ্কন", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "৮) ত্রিভুজ অঙ্কন", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "৯) সর্বসমতার ধারণা", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "১০) আসন্নমান", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "১১) ভগ্নাংশের বর্গমূল", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "১২) বীজগাণিতিক সূত্রাবলি", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "১৩) সমান্তরাল সরলরেখা ও ছেদকের ধারণা", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "১৪) ত্রিভুজের ধর্ম", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "১৫) সময় ও দূরত্ব", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "১৬) দ্বি-স্তম্ভ লেখা", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "১৭) আয়তক্ষেত্র ও বর্গক্ষেত্রের ক্ষেত্রফল", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "১৮) প্রতিসাম্য", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "১৯) উৎপাদকে বিশ্লেষণ", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "২০) চতুর্ভুজের শ্রেণীবিভাগ", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "২১) চতুর্ভুজ অঙ্কন", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"},
      {name: "২২) সমীকরণ গঠন ও সমাধান", link: "YOUR_DRIVE_LINK_HERE", quiz: "YOUR_QUIZ_LINK_HERE"}
    ];

    let currentSubject = "paribesh";

    function renderChapters(filterText = "") {
      const chapterData = currentSubject === "paribesh" ? paribeshChapters : onkoChapters;
      const panelId = currentSubject === "paribesh" ? "paribesh-panel" : "onko-panel";
      const icon = currentSubject === "paribesh" ? "fa-flask" : "fa-calculator";
      const headlineText = currentSubject === "paribesh" ? "পরিবেশের অধ্যায় সমূহ" : "গণিতের অধ্যায় সমূহ";
      
      let html = `<div class="panel-headline"><i class="fa-solid ${icon}"></i> ${headlineText}</div><ul class="chapter-list">`;
      
      const filteredChapters = chapterData.filter(ch => 
        ch.name.toLowerCase().includes(filterText.toLowerCase())
      );

      if (filteredChapters.length === 0) {
        html += `<li class="no-results"><i class="fa-solid fa-face-frown"></i> কোনো অধ্যায় পাওয়া যায়নি!</li>`;
      } else {
        filteredChapters.forEach((ch) => {
          const isValidLink = ch.link && ch.link.startsWith('http');
          const noteAction = isValidLink ? `window.open('${ch.link}', '_blank')` : `alert('এই চ্যাপ্টারের নোট এখনও আপলোড করা হয়নি!')`;

          const isValidQuiz = ch.quiz && ch.quiz.startsWith('http');
          const quizAction = isValidQuiz ? `window.open('${ch.quiz}', '_blank')` : `alert('এই চ্যাপ্টারের মক টেস্ট এখনও প্রস্তুত করা হয়নি!')`;

          const ytSearchUrl = `https://www.youtube.com/@physics_lover2.o/search?query=${encodeURIComponent(ch.name)}`;
          const videoAction = `window.open('${ytSearchUrl}', '_blank')`;

          html += `
            <li class="chapter-item">
              <div class="chapter-head">${ch.name}</div>
              <div class="action-bar">
                <button class="action-btn btn-notes" onclick="${noteAction}">
                  <i class="fa-brands fa-google-drive"></i>নোটস
                </button>
                <button class="action-btn btn-video" onclick="${videoAction}">
                  <i class="fa-brands fa-youtube"></i>ভিডিও ক্লাস
                </button>
                <button class="action-btn btn-quiz" onclick="${quizAction}">
                  <i class="fa-solid fa-pen-to-square"></i>মক টেস্ট
                </button>
              </div>
            </li>`;
        });
      }
      
      html += `</ul>`;
      document.getElementById(panelId).innerHTML = html;
    }

    // Initial Render
    renderChapters();

    // Tab Sync
    const tabs = document.querySelectorAll(".slide-tab");
    const panels = document.querySelectorAll(".chapter-panel");
    const searchInput = document.getElementById("search-input");

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        
        panels.forEach((p) => p.classList.remove("active"));
        
        currentSubject = tab.dataset.subject;
        document.getElementById(`${currentSubject}-panel`).classList.add("active");
        
        searchInput.value = ""; 
        renderChapters();
      });
    });

    // Live Search Event
    searchInput.addEventListener("input", (e) => {
      renderChapters(e.target.value);
    });

    // Glassmorphic Menu Toggle Logic
    const menuBtn = document.getElementById("menuBtn");
    const dropdownMenu = document.getElementById("dropdownMenu");

    menuBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      dropdownMenu.classList.toggle("show");
    });

    // Close menu when tapping anywhere else outside
    document.addEventListener("click", () => {
      dropdownMenu.classList.remove("show");
    });
  </script>
</body>
</html>
