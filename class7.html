<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <title>Class 7 | Physics Lover 2.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* --- Premium Glassmorphism Variables --- */
    :root {
      --bg-color: #050b14;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      
      --primary-cyan: #06b6d4;
      --primary-green: #10b981;
      --primary-gold: #fbbf24;
      
      --cyan-glow: rgba(6, 182, 212, 0.25);
      --purple-glow: rgba(139, 92, 246, 0.2);
      
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", "Noto Sans Bengali", sans-serif; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-color); color: var(--text-main);
      min-height: 100vh; padding: 15px 15px 90px 15px; overflow-x: hidden; position: relative;
    }

    /* --- Ambient Background Lights --- */
    .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
    .orb-1, .orb-2 { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.6; animation: float 15s infinite alternate ease-in-out; }
    .orb-1 { width: 300px; height: 300px; background: var(--cyan-glow); top: -5%; left: -10%; }
    .orb-2 { width: 300px; height: 300px; background: var(--purple-glow); bottom: 10%; right: -10%; animation-delay: 5s; }
    
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 30px) scale(1.1); }
    }

    /* --- Core Glass Panel --- */
    .glass-panel {
      background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 16px;
    }

    /* --- Header & Lang Switch --- */
    .wrapper { max-width: 900px; margin: 0 auto; position: relative; z-index: 10; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .back-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 8px; cursor: pointer; backdrop-filter: blur(10px);
    }
    .lang-switch { display: flex; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; }
    .lang-btn { background: none; border: none; color: var(--text-muted); padding: 6px 14px; font-size: 0.85rem; font-weight: 600; transition: 0.3s; cursor: pointer; }
    .lang-btn.active { background: var(--primary-cyan); color: #000; }

    /* --- Profile & Global Progress --- */
    .profile-area { margin-bottom: 25px; animation: slideDown 0.5s ease-out; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
    .student-name { font-size: 1.8rem; font-weight: 700; color: #fff; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 5px; }
    
    .global-progress { padding: 18px; margin-bottom: 25px; display: flex; flex-direction: column; gap: 12px; }
    .progress-text { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 600; color: #e2e8f0; }
    .progress-track { width: 100%; height: 8px; background: rgba(0,0,0,0.4); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, var(--primary-cyan)); width: 0%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 10px; }

    /* --- Subject Tabs --- */
    .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; }
    .tab {
      flex: 1; text-align: center; padding: 12px; border-radius: 14px; font-size: 0.95rem; font-weight: 600;
      background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); color: var(--text-muted); transition: 0.3s; cursor: pointer;
    }
    .tab.active { background: rgba(6, 182, 212, 0.1); color: #fff; border-color: var(--primary-cyan); }

    /* --- General Accordion (Zero Lag & No Padding Bug) --- */
    .accordion-body { display: grid; grid-template-rows: 0fr; transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    .accordion-card.expanded .accordion-body { grid-template-rows: 1fr; }
    .accordion-inner { overflow: hidden; }
    .content-pad { padding: 0 15px 15px 15px; }

    /* --- Chapters & Exams Card Styling --- */
    .panel { display: none; animation: fadeIn 0.4s ease; }
    .panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .chapter-card { margin-bottom: 12px; transition: 0.3s; }
    .chapter-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .chapter-title { font-size: 1rem; font-weight: 600; color: #f8fafc; line-height: 1.4; padding-right: 15px; }
    
    .chevron { transition: 0.3s; color: var(--text-muted); font-size: 1rem; }
    .accordion-card.expanded .chevron { transform: rotate(180deg); color: var(--primary-cyan); }

    /* For specific Exam Header Styling */
    .exam-header-style { background: rgba(251, 191, 36, 0.08); border-radius: 16px; }
    .exam-header-style .chapter-title { color: var(--primary-gold); }
    .exam-header-style .chevron { color: var(--primary-gold); }

    /* Inner Topic / Exam Item Box */
    .topic-box { background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; margin-top: 10px; }
    .topic-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 12px; color: #cbd5e1; text-align: center; }

    /* --- Action Buttons --- */
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .btn-action {
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px;
      padding: 10px; color: #fff; font-size: 0.85rem; font-weight: 500;
      display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s;
    }
    .btn-action:active { transform: scale(0.95); }
    
    /* --- Status Button (Completion Trigger) --- */
    .status-btn { width: 100%; padding: 12px; border-radius: 10px; font-size: 0.9rem; font-weight: 600; text-align: center; cursor: pointer; transition: 0.3s; border: none; }
    .status-pending { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--glass-border); }
    .status-running { background: rgba(6, 182, 212, 0.1); color: var(--primary-cyan); border: 1px solid var(--primary-cyan); pointer-events: none; }
    .status-completed { background: rgba(16, 185, 129, 0.15); color: var(--primary-green); border: 1px solid var(--primary-green); pointer-events: none; }

    /* --- Custom Glass Modal --- */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      z-index: 999999; display: flex; justify-content: center; align-items: center;
      opacity: 0; visibility: hidden; transition: 0.3s ease;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-box {
      background: rgba(15, 23, 42, 0.85); border: 1px solid var(--primary-cyan); border-radius: 20px;
      width: 85%; max-width: 320px; padding: 25px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      transform: scale(0.9); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.active .modal-box { transform: scale(1); }
    
    .modal-icon { font-size: 3rem; color: var(--primary-cyan); margin-bottom: 15px; }
    .modal-title { font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: 10px; }
    .modal-desc { font-size: 0.9rem; color: #cbd5e1; line-height: 1.5; margin-bottom: 25px; }
    .modal-btn { width: 100%; padding: 12px; background: var(--primary-cyan); border: none; border-radius: 12px; color: #000; font-weight: 700; font-size: 0.95rem; cursor: pointer; }

    /* --- Toast Notification --- */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 100px);
      background: rgba(15, 23, 42, 0.95); border: 1px solid var(--glass-border); border-radius: 30px;
      padding: 12px 20px; color: #fff; font-size: 0.85rem; font-weight: 500; backdrop-filter: blur(10px);
      display: flex; align-items: center; gap: 10px; z-index: 99999; opacity: 0; transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); width: max-content;
    }
    .toast.show { transform: translate(-50%, 0); opacity: 1; }
  </style>
</head>
<body>
    <div class="ambient-bg">
    <div class="orb-1"></div>
    <div class="orb-2"></div>
  </div>

  <div class="modal-overlay" id="customModal">
    <div class="modal-box">
      <div class="modal-icon" id="modalIcon"><i class="fa-solid fa-lock-open"></i></div>
      <h3 class="modal-title" id="modalTitle">কীভাবে Complete করবেন?</h3>
      <p class="modal-desc" id="modalDesc">নোটস বা ভিডিও ওপেন করে অন্তত ৫ মিনিট পড়াশোনা করুন। এরপর এটি স্বয়ংক্রিয়ভাবে Complete হয়ে যাবে!</p>
      <button class="modal-btn" onclick="closeModal()">বুঝেছি</button>
    </div>
  </div>

  <div class="toast" id="appToast">
    <i class="fa-solid fa-bell" style="color: var(--primary-gold)"></i>
    <span id="toastMsg">মেসেজ</span>
  </div>

  <div class="wrapper">
    <div class="header">
      <button class="back-btn" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i> Home</button>
      <div class="lang-switch">
        <button class="lang-btn active" id="btn-bn" onclick="toggleLang('bn')">বাংলা</button>
        <button class="lang-btn" id="btn-en" onclick="toggleLang('en')">EN</button>
      </div>
    </div>

    <div class="profile-area">
      <div style="font-size: 0.9rem; color: var(--text-muted); font-weight: 500;">Class 7 Portal</div>
      <div class="student-name" id="studentNameDisplay">Loading...</div>
    </div>

    <div class="glass-panel global-progress">
      <div class="progress-text">
        <span><i class="fa-solid fa-trophy" style="color:var(--primary-gold)"></i> Course Mastery</span>
        <span id="progressText">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressBar"></div>
      </div>
    </div>

    <div class="nav-tabs">
      <div class="tab active" data-tab="paribesh">Science</div>
      <div class="tab" data-tab="onko">Math</div>
    </div>

    <div id="paribesh-panel" class="panel active"></div>
    <div id="onko-panel" class="panel"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAAX6hiSpuP1HVFXZ4_6v4AAhDMLnILiwU",
        authDomain: "physics-lover-subhajit.firebaseapp.com",
        projectId: "physics-lover-subhajit",
        storageBucket: "physics-lover-subhajit.firebasestorage.app",
        messagingSenderId: "1045700071181",
        appId: "1:1045700071181:web:d72007e58508051792aa44"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let activeUser = null;
    let progressData = {};
    let lang = 'bn';
    
    // Timer Config
    const activeTimers = {}; 
    const REQUIRED_TIME_SECONDS = 300; 

    // Dynamic Exam Year
    const currentYear = new Date().getFullYear();
    const examYearDisplay = currentYear < 2026 ? 2026 : currentYear;

    // Database with Separated Exams for Science and Math
    const dbCourse = {
      exams: {
        paribesh: [
          { id: "p_ex_1", bn: "১ম সামেটিভ এক্সাম (Science)", en: "1st Summative Exam (Science)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" },
          { id: "p_ex_2", bn: "২য় সামেটিভ এক্সাম (Science)", en: "2nd Summative Exam (Science)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" },
          { id: "p_ex_3", bn: "৩য় সামেটিভ এক্সাম (Science)", en: "3rd Summative Exam (Science)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" }
        ],
        onko: [
          { id: "m_ex_1", bn: "১ম সামেটিভ এক্সাম (Math)", en: "1st Summative Exam (Math)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" },
          { id: "m_ex_2", bn: "২য় সামেটিভ এক্সাম (Math)", en: "2nd Summative Exam (Math)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" },
          { id: "m_ex_3", bn: "৩য় সামেটিভ এক্সাম (Math)", en: "3rd Summative Exam (Math)", linkSug: "URL_SUG", linkPyq: "URL_PYQ" }
        ]
      },
      paribesh: [
        { 
          id: "p7_c1", bn: "১) ভৌত পরিবেশ", en: "1) Physical Environment",
          topics: [
            { id: "p7_c1_s1", bn: "তাপ", en: "Heat", link: "URL" },
            { id: "p7_c1_s2", bn: "আলো", en: "Light", link: "URL" },
            { id: "p7_c1_s3", bn: "চুম্বক", en: "Magnet", link: "URL" },
            { id: "p7_c1_s4", bn: "তড়িৎ", en: "Electricity", link: "URL" }
          ]
        },
        { id: "p7_c2", bn: "২) সময় ও গতি", en: "2) Time and Motion", link: "URL" },
        { id: "p7_c3", bn: "৩) পরমানু ও রাসায়নিক বিক্রিয়া", en: "3) Atoms & Reactions", link: "URL" },
        { id: "p7_c4", bn: "৪) পরিবেশ গঠনে পদার্থের ভূমিকা", en: "4) Role of Matter", link: "URL" },
        { id: "p7_c5", bn: "৫) মানুষের খাদ্য", en: "5) Human Food", link: "URL" },
        { id: "p7_c6", bn: "৬) সজীব উপাদানের বৈচিত্র্য", en: "6) Structural Diversity", link: "URL" },
        { id: "p7_c7", bn: "৭) পরিবেশের সংকট", en: "7) Environmental Crisis", link: "URL" },
        { id: "p7_c8", bn: "৮) পরিবেশ ও জনস্বাস্থ্য", en: "8) Public Health", link: "URL" }
      ],
      onko: [
        { id: "m7_c1", bn: "১) পূর্বপাঠের পুনরালোচনা", en: "1) Revision", link: "URL" },
        { id: "m7_c2", bn: "২) অনুপাত", en: "2) Ratio", link: "URL" },
        { id: "m7_c3", bn: "৩) সমানুপাত", en: "3) Proportion", link: "URL" },
        { id: "m7_c4", bn: "৪) পূর্ণসংখ্যার হিসাব", en: "4) Integers Math", link: "URL" },
        { id: "m7_c5", bn: "৫) সূচকের ধারণা", en: "5) Index Concept", link: "URL" },
        { id: "m7_c6", bn: "৬) বীজগাণিতিক প্রক্রিয়া", en: "6) Algebraic Operations", link: "URL" },
        { id: "m7_c7", bn: "৭) কোণ অঙ্কন", en: "7) Angles Construction", link: "URL" }
      ]
    };

// Calculate Dynamic Total Items for Progress Bar
    let totalItems = 0;
    ['paribesh', 'onko'].forEach(sub => {
      totalItems += dbCourse.exams[sub].length;
      dbCourse[sub].forEach(chap => {
        if (chap.topics) totalItems += chap.topics.length;
        else totalItems += 1;
      });
    });

    // Authentication Init
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        activeUser = user;
        try {
          const snap = await getDoc(doc(db, "users", user.uid));
          if (snap.exists()) {
            document.getElementById('studentNameDisplay').innerText = snap.data().name || user.displayName || "Student";
            if (snap.data().progress) progressData = snap.data().progress;
          }
        } catch (e) { console.error(e); }
        renderUI();
        resumeActiveTimers();
      } else {
        window.location.href = "index.html";
      }
    });

    const t = (obj) => lang === 'bn' ? obj.bn : obj.en;

    // Modals & Toasts
    window.explainCompletion = () => {
      document.getElementById('modalTitle').innerText = lang === 'bn' ? 'কীভাবে Complete করবেন?' : 'How to Complete?';
      document.getElementById('modalDesc').innerText = lang === 'bn' ? 'যেকোনো নোটস বা ভিডিও ওপেন করে অন্তত ৫ মিনিট পড়াশোনা করুন। এরপর এটি স্বয়ংক্রিয়ভাবে Complete হয়ে যাবে!' : 'Open any notes or video and study for at least 5 mins to auto-complete!';
      document.querySelector('.modal-btn').innerText = lang === 'bn' ? 'বুঝেছি' : 'Got it';
      document.getElementById('customModal').classList.add('active');
    }
    
    window.closeModal = () => document.getElementById('customModal').classList.remove('active');

    window.showToast = (msg) => {
      const toast = document.getElementById('appToast');
      document.getElementById('toastMsg').innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Generate Status Button
    function getStatusBtn(id) {
      if (progressData[id]) return `<button class="status-btn status-completed"><i class="fa-solid fa-circle-check"></i> ${lang==='bn'?'সম্পন্ন হয়েছে':'Completed'}</button>`;
      if (activeTimers[id]) return `<button id="status_${id}" class="status-btn status-running"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</button>`;
      return `<button id="status_${id}" class="status-btn status-pending" onclick="explainCompletion()"><i class="fa-solid fa-lock"></i> ${lang==='bn'?'Complete করতে ট্যাপ করুন':'Tap to Complete'}</button>`;
    }

    // Render UI Elements
    function renderUI() {
      updateProgress();

      // Render Each Panel (Science & Math)
      ['paribesh', 'onko'].forEach(subject => {
        let html = "";
        
        // 1. Render Specific Exams for this Subject First
        let examContent = "";
        dbCourse.exams[subject].forEach(ex => {
          examContent += `
            <div class="topic-box" style="margin-top: 0; margin-bottom: 15px;">
              <div class="topic-name">${t(ex)}</div>
              <div class="btn-group">
                <button class="btn-action" onclick="triggerMaterial('${ex.id}', '${ex.linkSug}', '${t(ex)}')"><i class="fa-solid fa-book-open" style="color:var(--primary-gold)"></i> Sug ${examYearDisplay}</button>
                <button class="btn-action" onclick="triggerMaterial('${ex.id}', '${ex.linkPyq}', '${t(ex)}')"><i class="fa-solid fa-file-lines" style="color:var(--primary-cyan)"></i> PYQ</button>
              </div>
              ${getStatusBtn(ex.id)}
            </div>
          `;
        });

        // Exam Accordion Wrapper
        html += `
          <div class="glass-panel chapter-card accordion-card" id="exam_${subject}" style="border-color: rgba(251, 191, 36, 0.4); margin-bottom: 25px;">
            <div class="chapter-header exam-header-style" onclick="toggleAccordion('exam_${subject}')">
              <div class="chapter-title"><i class="fa-solid fa-file-signature"></i> Summative Exams & PYQ</div>
              <i class="fa-solid fa-chevron-down chevron"></i>
            </div>
            <div class="accordion-body">
              <div class="accordion-inner">
                <div class="content-pad" style="padding-top: 15px;">${examContent}</div>
              </div>
            </div>
          </div>
        `;

        // 2. Render Chapters
        dbCourse[subject].forEach((chap) => {
          let innerContent = "";
          if (chap.topics) {
            chap.topics.forEach(sub => {
              innerContent += `
                <div class="topic-box">
                  <div class="topic-name">${t(sub)}</div>
                  <div class="btn-group">
                    <button class="btn-action" onclick="triggerMaterial('${sub.id}', '${sub.link}', '${t(sub)}')"><i class="fa-solid fa-file-pdf" style="color:var(--primary-cyan)"></i> Note</button>
                    <button class="btn-action" onclick="triggerMaterial('${sub.id}', 'video', '${t(sub)}')"><i class="fa-brands fa-youtube" style="color:#ef4444"></i> Video</button>
                  </div>
                  ${getStatusBtn(sub.id)}
                </div>
              `;
            });
          } else {
            innerContent += `
              <div class="topic-box" style="background:transparent; border:none; padding:0; margin:0;">
                <div class="btn-group">
                  <button class="btn-action" onclick="triggerMaterial('${chap.id}', '${chap.link}', '${t(chap)}')"><i class="fa-solid fa-file-pdf" style="color:var(--primary-cyan)"></i> Note</button>
                  <button class="btn-action" onclick="triggerMaterial('${chap.id}', 'video', '${t(chap)}')"><i class="fa-brands fa-youtube" style="color:#ef4444"></i> Video</button>
                </div>
                ${getStatusBtn(chap.id)}
              </div>
            `;
          }

          html += `
            <div class="glass-panel chapter-card accordion-card" id="card_${chap.id}">
              <div class="chapter-header" onclick="toggleAccordion('card_${chap.id}')">
                <div class="chapter-title">${t(chap)}</div>
                <i class="fa-solid fa-chevron-down chevron"></i>
              </div>
              <div class="accordion-body">
                <div class="accordion-inner">
                  <div class="content-pad">${innerContent}</div>
                </div>
              </div>
            </div>
          `;
        });
        
        document.getElementById(`${subject}-panel`).innerHTML = html;
      });
      
      resumeActiveTimers(); 
    }

    // Toggle Handlers
    window.toggleLang = (l) => { lang = l; renderUI(); document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active')); document.getElementById(`btn-${l}`).classList.add('active'); }
    
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); e.target.classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById(`${e.target.dataset.tab}-panel`).classList.add('active');
      });
    });

    window.toggleAccordion = (cardId) => {
      document.getElementById(cardId).classList.toggle('expanded');
    }

    // Material & Timer Triggers
    window.triggerMaterial = (id, link, titleStr) => {
      if (link === 'video') window.open(`https://www.youtube.com/results?search_query=@Physics_Lover2.O+${titleStr}+class+7`, '_blank');
      else if (link && link.includes("http")) window.open(link, '_blank');
      else { showToast(lang==='bn' ? "শিঘ্রই আপলোড হবে!" : "Uploading Soon!"); return; }

      if (!progressData[id] && !activeTimers[id]) {
        const targetEndTime = Date.now() + (REQUIRED_TIME_SECONDS * 1000);
        localStorage.setItem('timer_' + id, targetEndTime);
        runTimerLoop(id);
        showToast(lang==='bn' ? "টাইমার শুরু হয়েছে (৫ মিনিট)..." : "Timer started (5 mins)...");
      }
    }

    // Core Timer Logic (Background Proof)
    function runTimerLoop(id) {
      const updateBtn = (sec) => {
        const btn = document.getElementById(`status_${id}`);
        if(btn && !progressData[id]) {
          btn.className = "status-btn status-running";
          btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> ${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;
        }
      };

      activeTimers[id] = setInterval(() => {
        const endTime = localStorage.getItem('timer_' + id);
        if (!endTime) { clearInterval(activeTimers[id]); return; }
        
        const remaining = Math.ceil((endTime - Date.now()) / 1000);
        
        if (remaining <= 0) {
          clearInterval(activeTimers[id]);
          localStorage.removeItem('timer_' + id);
          delete activeTimers[id];
          commitComplete(id);
        } else {
          updateBtn(remaining);
        }
      }, 1000);
    }

    function resumeActiveTimers() {
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('timer_')) {
          const id = key.replace('timer_', '');
          if (!progressData[id] && !activeTimers[id]) runTimerLoop(id);
          else if (progressData[id]) localStorage.removeItem(key);
        }
      }
    }
    // Save Logic
    async function commitComplete(id) {
      if (progressData[id]) return;
      progressData[id] = true;
      
      const btn = document.getElementById(`status_${id}`);
      if(btn) {
        btn.className = "status-btn status-completed";
        btn.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${lang==='bn'?'সম্পন্ন হয়েছে':'Completed'}`;
      }
      
      showToast(lang==='bn' ? "অভিনন্দন! টপিক সম্পন্ন হয়েছে।" : "Congrats! Topic Completed.");
      updateProgress();

      try { await updateDoc(doc(db, "users", activeUser.uid), { [`progress.${id}`]: true }); } 
      catch (e) { console.error(e); }
    }

    function updateProgress() {
      let doneCount = Object.values(progressData).filter(v => v === true).length;
      let percent = Math.min(100, Math.round((doneCount / totalItems) * 100)) || 0;
      document.getElementById('progressBar').style.width = `${percent}%`;
      document.getElementById('progressText').innerText = `${percent}%`;
    }
  </script>
</body>
</html>
