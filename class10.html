<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <title>Class 10 | Physics Lover 2.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Google Fonts & FontAwesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-glow-1: #0ea5e9;
      --bg-glow-2: #ec4899;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-cyan: #06b6d4;
      --accent-purple: #a855f7;
    }

    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", "Noto Sans Bengali", sans-serif;
      background: #020617;
      color: #f3f4f6;
      min-height: 100vh;
      padding: 15px 12px;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Ambient Glowing Blobs */
    .bg-glow {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      opacity: 0.2;
      animation: floatGlow 12s infinite alternate ease-in-out;
    }
    .glow-1 { top: -5%; left: -10%; background: var(--bg-glow-1); }
    .glow-2 { bottom: -5%; right: -10%; background: var(--bg-glow-2); animation-delay: 6s; }

    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(20px, 20px) scale(1.1); }
    }

    .wrapper {
      position: relative;
      z-index: 10;
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
    }

    .header-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 25px;
      padding-top: 10px;
    }

    /* Glassmorphic Dropdown Menu Container */
    .menu-container {
      position: absolute;
      left: 0;
      z-index: 100;
    }

    .menu-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: #fff;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      transition: all 0.3s ease;
    }
    .menu-btn:hover, .menu-btn:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: 50px;
      left: 0;
      background: rgba(10, 15, 30, 0.85);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 16px;
      width: 170px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      animation: menuEntrance 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .dropdown-menu.show { display: block; }

    @keyframes menuEntrance {
      from { opacity: 0; transform: translateY(-10px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .dropdown-menu a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      color: #e5e7eb;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      transition: all 0.2s ease;
    }
    .dropdown-menu a:last-child { border-bottom: none; }
    .dropdown-menu a:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--accent-cyan);
    }

    .header-title {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    /* Premium Custom Tab Bar (3 Item Grid for Class 10) */
    .tab-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      padding: 6px;
      border-radius: 16px;
      backdrop-filter: blur(20px);
      margin-bottom: 20px;
    }

    .slide-tab {
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      color: #9ca3af;
      background: transparent;
      border: none;
      border-radius: 12px;
      padding: 12px 0;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s ease;
    }

    .slide-tab.active {
      background: rgba(255, 255, 255, 0.07);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Modern Search Bar */
    .search-container {
      position: relative;
      margin-bottom: 20px;
    }

    .search-input {
      width: 100%;
      padding: 13px 16px 13px 42px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      backdrop-filter: blur(20px);
      transition: all 0.3s ease;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent-cyan);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-size: 0.95rem;
    }

    /* Chapter Content Panels */
    .chapter-panel {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 22px;
      padding: 20px 14px;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      display: none;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      animation: cardEntrance 0.4s ease-out;
    }

    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chapter-panel.active { display: block; }

    .panel-headline {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 10px;
    }

    .panel-headline i { color: var(--accent-cyan); }
    .chapter-list { list-style: none; }

    /* Chapter Item Design */
    .chapter-item {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .chapter-head {
      font-size: 0.92rem;
      font-weight: 500;
      line-height: 1.4;
      color: #e5e7eb;
      margin-bottom: 12px;
    }

    .no-results {
      text-align: center;
      color: #9ca3af;
      padding: 20px 0;
      font-size: 0.9rem;
    }

    /* Actions Layout configured perfectly into 4 clean columns */
    .action-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }

    .action-btn {
      padding: 10px 1px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #e5e7eb;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.25s ease;
    }

    .btn-notes:hover {
      background: linear-gradient(135deg, #06b6d4, #2563eb);
      color: #fff;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.25);
      border-color: transparent;
    }

    .btn-video:hover {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
      border-color: transparent;
    }

    .btn-quiz:hover {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.25);
      border-color: transparent;
    }

    .btn-pyq:hover {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
      border-color: transparent;
    }

    .action-btn i { font-size: 0.95rem; }

    /* Ultra Mobile Optimization */
    @media (max-width: 380px) {
      .header-title { font-size: 1.4rem; }
      .slide-tab { font-size: 0.76rem; padding: 10px 0; }
      .action-btn { font-size: 0.65rem; padding: 8px 0px; }
      .action-btn i { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <div class="bg-glow glow-1"></div>

  <div class="wrapper">

        { name: "তাপের ঘটনাসমূহ", yt: "https://youtu.be/sXcrJvESVLE?si=Gb6_F2mrQJlxqmhc", notes: "https://drive.google.com/file/d/1NFlHlfJ45lB9mU-zDP-lQufwH0D-8u8F/preview", mock: "#", pyq: "#" },
        { name: "আলো", yt: "https://youtube.com/playlist?list=PL5AgcjAW3EFJd_T1kmaf6YUrhvxHsbhTv&si=gOtU4KoLmdtcQjHF", notes: "https://drive.google.com/file/d/1FrVvqr_nX5np_k40KeHn2vAkVv_NIn2y/preview", mock: "#", pyq: "#" },
        { name: "চল তড়িৎ", yt: "https://youtu.be/Qd0lshhBZuQ?si=10d0Za2LKOirH2s1", notes: "#", mock: "#", pyq: "#" },
        { name: "পরমাণুর নিউক্লিয়াস", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "পদার্থের গঠন ও রাসায়নিক ধর্মসমূহ", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "পর্যায় সারণি এবং মৌলদের ধর্মের পর্যায়বৃত্ততা", yt: "#", notes: "https://drive.google.com/file/d/1omjeeTucE40cmdhfdemH_XZAbTRfCcCd/preview", mock: "#", pyq: "#" },
        { name: "আম্লীয় ও ক্ষারীয় বলন", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "تড়িৎ প্রবাহ ও রাসায়নিক বিক্রিয়া", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "পরীক্ষাগার ও রাসায়নিক শিল্পে অজৈব বস্তুসমূহ", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "ধাতুবিদ্যা", yt: "#", notes: "#", mock: "#", pyq: "#" }
      ],
      jibon: [
        { name: "জীবজগতে নিয়ন্ত্রণে ও সমন্বয়", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "জীবনের প্রবাহমানতা", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "বংশগতি এবং কয়েকটি সাধারন জিনগত রোগ", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "অভিব্যক্তি ও অভিযোজন", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "পরিবেশ, তার সম্পদ এবং তাদের সংরক্ষণ", yt: "#", notes: "#", mock: "#", pyq: "#" }
      ],
      onko: [
        { name: "একচলবিশিষ্ট দ্বিঘাত সমীকরণ", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "সরল সুদকষা", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "বৃত্ত সম্পর্কিত উপপাদ্য", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "আয়তঘন", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "অনুপাত ও সমানুপাত", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "চক্রবৃদ্ধি সুদ ও সমাহার বৃদ্ধি বা হ্রাস", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "বৃত্তস্থ কোণ সম্পর্কিত উপপাদ্য", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "লম্ব বৃত্তাকার চোঙ", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "দ্বিঘাত করণী", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "বৃত্তস্থ চতুর্ভুজ সংক্রান্ত উপপাদ্য", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "সম্পাদ্য : ত্রিভূজের পরিবৃত্ত ও অন্তর্বৃত্ত অঙ্কন", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "গোলক", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "ভেদ", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "অংশীদারি কারবার", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "বৃত্তের স্পর্শক সংক্রান্ত উপপাদ্য", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "লম্ব বৃত্তাকার শঙ্কু", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "সম্পাদ্য : বৃত্তের স্পর্শক অঙ্কন", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "সদৃশতা", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "বিভিন্ন ঘনবস্তু সংক্রান্ত বাস্তব সমস্যা", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "ত্রিকোণমিতি: কোণ পরিমাপের ধারণা", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "সম্পাদ্য : মধ্যসমানুপাতী নির্ণয়", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "পিথাগোরাসের উপপাদ্য", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "ত্রিকোণমিতিক অনুপাত ও ত্রিকোণমিতিক অভেদাবলি", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "পুরক কোণের ত্রিকোণমিতিক অনুপাত", yt: "#", notes: "#", mock: "#", pyq: "#" },
        { name: "ত্রিকোণমিতিক অনুপাতের প্রয়োগ: উচ্চতা ও দূরত্ব", yt: "#", notes: "#", mock: "#", pyq: "#" },

      ]
    };

    let currentSubject = "vouto";

    function renderChapters(filterText = "") {
      const chapterData = subjects[currentSubject] || [];
      const panelId = `${currentSubject}-panel`;
      
      let icon = "fa-atom";
      let headlineText = "ভৌত বিজ্ঞান অধ্যায় সমূহ";
      if (currentSubject === "jibon") {
        icon = "fa-dna";
        headlineText = "জীবন বিজ্ঞান অধ্যায় সমূহ";
      } else if (currentSubject === "onko") {
        icon = "fa-calculator";
        headlineText = "অঙ্কের অধ্যায় সমূহ";
      }

      // Reset all content containers safely
      document.getElementById("vouto-panel").innerHTML = "";
      document.getElementById("jibon-panel").innerHTML = "";
      document.getElementById("onko-panel").innerHTML = "";
      
      let html = `<div class="panel-headline"><i class="fa-solid ${icon}"></i> ${headlineText}</div><ul class="chapter-list">`;
      
      const filteredChapters = chapterData.filter(ch => 
        ch.name.toLowerCase().includes(filterText.toLowerCase())
      );

      if (filteredChapters.length === 0) {
        html += `<li class="no-results"><i class="fa-solid fa-face-frown"></i> কোনো অধ্যায় পাওয়া যায়নি!</li>`;
      } else {
        filteredChapters.forEach((ch, idx) => {
          const isValidNotes = ch.notes && ch.notes.startsWith('http');
          const noteAction = isValidNotes ? `window.open('${ch.notes}', '_blank')` : `alert('এই চ্যাপ্টারের নোট এখনও আপলোড করা হয়নি!')`;

          const isValidQuiz = ch.mock && ch.mock.startsWith('http');
          const quizAction = isValidQuiz ? `window.open('${ch.mock}', '_blank')` : `alert('এই চ্যাপ্টারের মক টেস্ট এখনও প্রস্তুত করা হয়নি!')`;

          const isValidPyq = ch.pyq && ch.pyq.startsWith('http');
          const pyqAction = isValidPyq ? `window.open('${ch.pyq}', '_blank')` : `alert('এই চ্যাপ্টারের বিগত বছরের প্রশ্নপত্র (PYQ) এখনও আপলোড করা হয়নি!')`;

          // Deep automated search querying for Class 10
          let videoAction;
          if (ch.yt && ch.yt.startsWith('http')) {
            videoAction = `window.open('${ch.yt}', '_blank')`;
          } else {
            const searchQuery = `@Physics_Lover2.O "Physics Lover 2.0" ${ch.name} ক্লাস 10`;
            const ytSearchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(searchQuery)}`;
            videoAction = `window.open('${ytSearchUrl}', '_blank')`;
          }

          html += `
            <li class="chapter-item">
              <div class="chapter-head">${idx + 1}. ${ch.name}</div>
              <div class="action-bar">
                <button class="action-btn btn-notes" onclick="${noteAction}">
                  <i class="fa-brands fa-google-drive"></i>নোটস
                </button>
                <button class="action-btn btn-video" onclick="${videoAction}">
                  <i class="fa-brands fa-youtube"></i>প্লেলিস্ট
                </button>
                <button class="action-btn btn-quiz" onclick="${quizAction}">
                  <i class="fa-solid fa-pen-to-square"></i>মক
                </button>
                <button class="action-btn btn-pyq" onclick="${pyqAction}">
                  <i class="fa-solid fa-scroll"></i>PYQ
                </button>
              </div>
            </li>`;
        });
      }
      
      html += `</ul>`;
      document.getElementById(panelId).innerHTML = html;
    }

    // Render initial initialization
    renderChapters();

    // Tab Synchronizer Component
    const tabs = document.querySelectorAll(".slide-tab");
    const panels = document.querySelectorAll(".chapter-panel");
    const searchInput = document.getElementById("search-input");

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        
        panels.forEach((p) => p.classList.remove("active"));
        
        currentSubject = tab.dataset.subject;
        document.getElementById(`${currentSubject}-panel`).classList.add("active");
        
        searchInput.value = ""; 
        renderChapters();
      });
    });

    // Instant Input Search Filter Execution
    searchInput.addEventListener("input", (e) => {
      renderChapters(e.target.value);
    });

    // Navbar Dropdown Mechanics
    const menuBtn = document.getElementById("menuBtn");
    const dropdownMenu = document.getElementById("dropdownMenu");

    menuBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      dropdownMenu.classList.toggle("show");
    });

    document.addEventListener("click", () => {
      dropdownMenu.classList.remove("show");
    });
  </script>
</body>
</html>
