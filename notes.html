<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Notes | Physics Lover 2.0</title>
    <meta name="theme-color" content="#050b14">
    <link rel="icon" href="logo.png">
    
    <!-- Premium Typography & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        /* Extra styles specific to internal pages */
        .page-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .back-btn {
            width: 40px; height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-glass);
            transition: var(--transition-fast);
        }
        .back-btn:hover { background: rgba(59, 130, 246, 0.2); border-color: var(--accent-blue-light); }
        .page-title { font-size: 1.5rem; font-weight: 700; }
        
        .all-items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }
        /* --- Premium Save Button Styles --- */
/* --- Ultra-Modern Save Button --- */
.save-note-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-secondary); font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); /* Apple style spring */
    z-index: 10; position: relative; cursor: pointer;
}
.save-note-btn:hover {
    background: rgba(16, 185, 129, 0.15); color: #10B981;
    transform: scale(1.1);
}
.save-note-btn.saved {
    background: #10B981; border-color: #10B981; color: #fff;
    box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
    animation: popBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes popBounce {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
}

/* --- Premium Glassmorphism Toast Popup --- */
.toast-popup {
    position: fixed; bottom: 40px; left: 50%; 
    transform: translate(-50%, 100px) scale(0.9);
    background: rgba(20, 25, 40, 0.85); 
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px;
    padding: 14px 24px; display: flex; align-items: center; gap: 16px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    color: #fff; opacity: 0; visibility: hidden; z-index: 99999;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); 
    min-width: max-content;
}
.toast-popup.show {
    transform: translate(-50%, 0) scale(1); opacity: 1; visibility: visible;
}
.toast-icon {
    width: 32px; height: 32px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; font-size: 1rem;
}
.toast-popup.success .toast-icon { background: rgba(16, 185, 129, 0.2); color: #10B981; }
.toast-popup.removed .toast-icon { background: rgba(239, 68, 68, 0.2); color: #EF4444; }
.toast-text { font-size: 0.95rem; font-weight: 500; letter-spacing: 0.3px; }

@media (max-width: 600px) {
    .toast-popup { width: 90%; bottom: 20px; padding: 14px 20px; }
}


    </style>
</head>
<body>

    <!-- Simple Navbar -->
    <header class="top-nav glass-panel">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="brand-link">
                    <img src="./logo.png" alt="Physics Lover 2.0 Logo" class="brand-logo-img">
                    <div class="brand-info">
                        <h1 class="brand-title">Physics Lover <span class="highlight-blue">2.0</span></h1>
                    </div>
                </a>
            </div>
            <div class="nav-right">
                <button class="icon-btn" aria-label="Toggle Theme" id="themeToggle">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h2 class="page-title">All Premium Notes</h2>
        </div>

        <!-- Notes Grid -->
  <!-- notes.html এর জন্য -->
<div class="all-items-grid" id="notesListContainer">
    <!-- এখানে জাভাস্ক্রিপ্ট অটোমেটিক সব নোটস লোড করবে -->
</div>



    </main>
    <!-- Toast Notification Element -->
<div id="toastPopup" class="toast-popup">
    <div class="toast-icon" id="toastIcon"><i class="fa-solid fa-check"></i></div>
    <div class="toast-text" id="toastText">Note saved to your collection!</div>
</div>


    <script src="script.js"></script>
</body>
</html>
